<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DocSearch — Administration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 24px;
              display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 600; color: #185FA5; }
    .header a { font-size: 14px; color: #185FA5; text-decoration: none; margin-left: auto; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; display: flex;
                 flex-direction: column; gap: 24px; }

    .panel { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 20px; }
    .panel h2 small { font-weight: 400; color: #888; font-size: 12px; margin-left: 8px; }

    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px;
                     font-size: 16px; color: #1a1a18; margin: 0; cursor: pointer; user-select: none; }
    .accordion-caret { font-size: 11px; color: #888; flex-shrink: 0; transition: transform 0.15s; }
    .panel.collapsed .accordion-caret { transform: rotate(-90deg); }
    .panel-body { margin-top: 14px; }
    .panel.collapsed .panel-body { display: none; }

    .panel-group { display: flex; flex-direction: column; gap: 24px; }
    .section-group-title { display: flex; align-items: center; justify-content: space-between; gap: 12px;
                            font-size: 12px; font-weight: 700; text-transform: uppercase;
                            letter-spacing: 0.08em; color: #185FA5; padding-bottom: 6px;
                            border-bottom: 2px solid #E6F1FB; cursor: pointer; user-select: none; }
    .group-caret { font-size: 11px; color: #185FA5; flex-shrink: 0; transition: transform 0.15s; }
    .panel-group.collapsed .group-caret { transform: rotate(-90deg); }
    .panel-group-body { display: flex; flex-direction: column; gap: 24px; }
    .panel-group.collapsed .panel-group-body { display: none; }

    .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                   gap: 12px; }
    .status-card { border: 1px solid #e5e5e0; border-radius: 8px; padding: 12px; }
    .status-card .name { font-size: 12px; color: #888; margin-bottom: 4px; }
    .status-card .value { font-size: 15px; font-weight: 600; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
    .dot.up { background: #1f9254; }
    .dot.down { background: #c92a2a; }
    .dot.warn { background: #e8990c; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    th { color: #888; font-weight: 500; font-size: 12px; }
    input[type=text], input[type=number] { padding: 5px 8px; border: 1px solid #d5d5ce;
                                            border-radius: 6px; font-size: 13px; width: 100%; }
    input[type=checkbox] { width: 16px; height: 16px; }

    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .row input[type=text] { flex: 1; }

    button { padding: 6px 14px; background: #185FA5; color: #fff; border: none;
             border-radius: 6px; cursor: pointer; font-size: 13px; }
    button.secondary { background: #eee; color: #333; }
    button.danger { background: #c92a2a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: #ececfd; color: #3C3489; padding: 4px 10px; border-radius: 12px;
           font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .tag button { background: none; color: #3C3489; padding: 0; font-size: 14px; line-height: 1; }

    .muted { color: #888; font-size: 12px; }
    .error-banner { background: #fff0f0; border: 1px solid #f5c2c2; color: #a12a2a;
                    padding: 14px 18px; border-radius: 8px; }
    .save-hint { font-size: 11px; color: #1f9254; margin-left: 8px; opacity: 0; transition: opacity .3s; }
    .save-hint.show { opacity: 1; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">DocSearch — Administration</span>
    <button id="toggle-all-panels" onclick="toggleAllPanels()"
            style="margin-left:auto;background:none;border:none;color:#185FA5;font-size:14px;cursor:pointer;padding:0;font-family:inherit;">Tout replier</button>
    <a href="/admin-help.html">Aide</a>
    <a href="/stats.html">Statistiques</a>
    <a href="/">← Recherche</a>
  </header>

  <div class="container" id="app">
    <p class="muted">Chargement…</p>
  </div>

  <script>
    const $app = document.getElementById('app');

    // ── Accordéon ────────────────────────────────────────────────
    // État tenu à part du HTML régénéré à chaque refresh() (toutes les
    // 5s pour État des composants, ou après chaque action) —
    // sans ça, replier une section serait annulé au prochain
    // rafraîchissement. Persisté en localStorage (par navigateur/poste,
    // pas de compte utilisateur dans cette appli) pour retrouver les
    // mêmes panneaux repliés d'une session à l'autre. Rien de replié
    // par défaut si localStorage est vide/indisponible (navigation
    // privée, quota dépassé...).
    const COLLAPSED_STORAGE_KEY = 'docsearch-admin-collapsed-panels';

    function loadCollapsedPanels() {
      try {
        return new Set(JSON.parse(localStorage.getItem(COLLAPSED_STORAGE_KEY) || '[]'));
      } catch (e) {
        return new Set();
      }
    }

    const collapsedPanels = loadCollapsedPanels();

    function toggleAccordion(id) {
      if (collapsedPanels.has(id)) collapsedPanels.delete(id); else collapsedPanels.add(id);
      document.getElementById(id)?.classList.toggle('collapsed', collapsedPanels.has(id));
      try {
        localStorage.setItem(COLLAPSED_STORAGE_KEY, JSON.stringify([...collapsedPanels]));
      } catch (e) {
        // localStorage indisponible : le pli reste actif pour cette session, simplement pas persisté.
      }
      updateToggleAllLabel();
    }

    // ── Accordéon de groupe ─────────────────────────────────────
    // Second niveau, indépendant du premier : replie/déplie une SECTION
    // entière (ex. "Sources SQL", qui regroupe plusieurs panneaux) sans
    // toucher à l'état individuel de ses panneaux — les rouvrir plus tard
    // les retrouve chacun tel qu'ils étaient. Clé localStorage séparée
    // (des ids de groupe, pas de panneau) pour ne pas mélanger les deux
    // jeux d'état.
    const COLLAPSED_GROUPS_KEY = 'docsearch-admin-collapsed-groups';

    function loadCollapsedGroups() {
      try {
        return new Set(JSON.parse(localStorage.getItem(COLLAPSED_GROUPS_KEY) || '[]'));
      } catch (e) {
        return new Set();
      }
    }

    const collapsedGroups = loadCollapsedGroups();

    function toggleGroupAccordion(id) {
      if (collapsedGroups.has(id)) collapsedGroups.delete(id); else collapsedGroups.add(id);
      document.getElementById(id)?.classList.toggle('collapsed', collapsedGroups.has(id));
      try {
        localStorage.setItem(COLLAPSED_GROUPS_KEY, JSON.stringify([...collapsedGroups]));
      } catch (e) {
        // localStorage indisponible : le pli reste actif pour cette session, simplement pas persisté.
      }
      updateToggleAllLabel();
    }

    // Un seul bouton, qui replie ou déplie TOUS les panneaux ET TOUS les
    // groupes selon l'état actuel — si au moins un est déplié (panneau ou
    // groupe), l'action est "tout replier" ; une fois tout repliés, elle
    // devient "tout déplier". Évite d'avoir des boutons séparés pour un
    // cas d'usage aussi simple.
    function toggleAllPanels() {
      const panels = document.querySelectorAll('#app .panel');
      const groups = document.querySelectorAll('#app .panel-group');
      const anyExpanded = Array.from(panels).some(p => !p.classList.contains('collapsed'))
                        || Array.from(groups).some(g => !g.classList.contains('collapsed'));
      panels.forEach(p => {
        p.classList.toggle('collapsed', anyExpanded);
        if (anyExpanded) collapsedPanels.add(p.id); else collapsedPanels.delete(p.id);
      });
      groups.forEach(g => {
        g.classList.toggle('collapsed', anyExpanded);
        if (anyExpanded) collapsedGroups.add(g.id); else collapsedGroups.delete(g.id);
      });
      try {
        localStorage.setItem(COLLAPSED_STORAGE_KEY, JSON.stringify([...collapsedPanels]));
        localStorage.setItem(COLLAPSED_GROUPS_KEY, JSON.stringify([...collapsedGroups]));
      } catch (e) {
        // localStorage indisponible : le pli reste actif pour cette session, simplement pas persisté.
      }
      updateToggleAllLabel();
    }

    function updateToggleAllLabel() {
      const btn = document.getElementById('toggle-all-panels');
      if (!btn) return;
      const panels = document.querySelectorAll('#app .panel');
      const groups = document.querySelectorAll('#app .panel-group');
      const anyExpanded = Array.from(panels).some(p => !p.classList.contains('collapsed'))
                        || Array.from(groups).some(g => !g.classList.contains('collapsed'));
      btn.textContent = anyExpanded ? 'Tout replier' : 'Tout déplier';
    }

    function panelWrap(id, title, subtitle, bodyHtml) {
      return `
        <div class="panel${collapsedPanels.has(id) ? ' collapsed' : ''}" id="${id}">
          <h2 class="panel-header" onclick="toggleAccordion('${id}')">
            <span>${title}${subtitle ? ` <small>${subtitle}</small>` : ''}</span>
            <span class="accordion-caret">▾</span>
          </h2>
          <div class="panel-body">${bodyHtml}</div>
        </div>`;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const err = new Error(body.detail || `Erreur ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return res.json();
    }

    function statusDot(up) {
      if (up === true) return '<span class="dot up"></span>';
      if (up === false) return '<span class="dot down"></span>';
      return '<span class="dot warn"></span>';
    }

    function clusterStatusDot(status) {
      // Couleur du point basée sur le statut réel du cluster ES
      // (green/yellow/red), pas juste up/down — un cluster "yellow"
      // est up mais dégradé, ça doit se voir.
      if (status === 'green')  return '<span class="dot up"></span>';
      if (status === 'yellow') return '<span class="dot warn"></span>';
      if (status === 'red')    return '<span class="dot down"></span>';
      return '<span class="dot warn"></span>';
    }

    // ── Rendu de l'état des composants ─────────────────────────
    async function renderStatus() {
      const s = await api('/admin/status');
      const tika = s.tika || {};
      const workers = s.workers || {};
      const watcher = s.watcher || {};

      const body = `
          <div class="status-grid">
            <div class="status-card">
              <div class="name">Elasticsearch</div>
              <div class="value">${s.elasticsearch?.up ? clusterStatusDot(s.elasticsearch.status) : statusDot(false)}${s.elasticsearch?.status || (s.elasticsearch?.up ? 'up' : 'down')}</div>
            </div>
            <div class="status-card">
              <div class="name">Redis</div>
              <div class="value">${statusDot(s.redis?.up)}${s.redis?.up ? 'up' : 'down'}</div>
            </div>
            <div class="status-card">
              <div class="name">Kafka</div>
              <div class="value">${statusDot(s.kafka?.up)}${s.kafka?.up ? 'up' : 'down'}</div>
            </div>
            <div class="status-card">
              <div class="name">Tika</div>
              <div class="value">${statusDot(tika.up_count > 0)}${tika.up_count ?? '?'}/${tika.total ?? '?'} instances</div>
            </div>
            <div class="status-card">
              <div class="name">Workers actifs</div>
              <div class="value">${statusDot(workers.active_workers > 0)}${workers.active_workers ?? '?'}</div>
            </div>
            <div class="status-card">
              <div class="name">Watcher</div>
              <div class="value">${statusDot(watcher.alive)}${watcher.alive ? 'actif' : 'silencieux'}</div>
              <div class="muted">${watcher.last_seen_seconds_ago != null ? `vu il y a ${watcher.last_seen_seconds_ago}s` : ''}</div>
            </div>
            <div class="status-card">
              <div class="name">File d'indexation</div>
              <div class="value">${workers.pending_documents ?? '?'}</div>
              <div class="muted">document(s) en attente de traitement</div>
            </div>
          </div>`;
      return panelWrap('status-panel', 'État des composants', 'rafraîchi toutes les 5s', body);
    }

    // ── Types de fichiers ───────────────────────────────────────
    async function renderFiletypes() {
      if (!fileSourcesCache[selectedFiletypeSource]) selectedFiletypeSource = 'documents';
      const cfg = await api(`/admin/filetypes?source=${encodeURIComponent(selectedFiletypeSource)}`);
      const rows = Object.entries(cfg).map(([ext, rule]) => `
        <tr data-ext="${ext}">
          <td>${ext}</td>
          <td><input type="checkbox" class="ft-enabled" ${rule.enabled ? 'checked' : ''} /></td>
          <td><input type="number" class="ft-size" value="${rule.max_size_mb ?? ''}" min="0" step="1" /></td>
          <td><button class="secondary ft-save">Enregistrer</button><span class="save-hint">✓ enregistré</span></td>
          <td>${ext === 'default' ? '' : '<button class="danger ft-delete">Supprimer</button>'}</td>
        </tr>`).join('');

      const body = `
          <div class="row">
            <label class="muted" for="filetype-source">Source :</label>
            <select id="filetype-source">${fileSourceOptions(selectedFiletypeSource)}</select>
          </div>
          <table>
            <thead><tr><th>Extension</th><th>Activé</th><th>Taille max (Mo)</th><th></th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <input type="text" id="new-ext" placeholder="nouvelle extension (ex: jpg)" />
            <input type="number" id="new-ext-size" placeholder="Mo" style="max-width:90px;" />
            <button id="add-ext">Ajouter</button>
            <button id="reset-filetypes" class="secondary">Charger les extensions par défaut</button>
          </div>`;
      return panelWrap('filetypes-panel', 'Types de fichiers', 'par source — chaque source a sa propre configuration', body);
    }

    function wireFiletypes() {
      document.getElementById('filetype-source')?.addEventListener('change', async (e) => {
        selectedFiletypeSource = e.target.value;
        await refresh();
      });
      document.querySelectorAll('.ft-save').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const ext = tr.dataset.ext;
          const enabled = tr.querySelector('.ft-enabled').checked;
          const max_size_mb = parseFloat(tr.querySelector('.ft-size').value) || null;
          await api(`/admin/filetypes/${ext}`, { method: 'POST', body: JSON.stringify({ enabled, max_size_mb, source: selectedFiletypeSource }) });
          const hint = e.target.nextElementSibling;
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1500);
        });
      });
      document.querySelectorAll('.ft-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const ext = tr.dataset.ext;
          if (!confirm(`Supprimer l'extension .${ext} (source '${selectedFiletypeSource}') ? Elle ne sera plus indexée pour cette source.`)) return;
          await api(`/admin/filetypes/${ext}?source=${encodeURIComponent(selectedFiletypeSource)}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-ext')?.addEventListener('click', async () => {
        const ext = document.getElementById('new-ext').value.trim().replace(/^\./, '');
        const size = parseFloat(document.getElementById('new-ext-size').value) || null;
        if (!ext) return;
        await api(`/admin/filetypes/${ext}`, { method: 'POST', body: JSON.stringify({ enabled: true, max_size_mb: size, source: selectedFiletypeSource }) });
        await refresh();
      });
      document.getElementById('reset-filetypes')?.addEventListener('click', async () => {
        if (!confirm(`Charger les extensions par défaut pour la source '${selectedFiletypeSource}' ? Toute extension ajoutée et tout réglage personnalisé (activation, taille max) seront écrasés pour cette source.`)) return;
        await api(`/admin/filetypes/reset?source=${encodeURIComponent(selectedFiletypeSource)}`, { method: 'POST' });
        await refresh();
      });
    }

    // ── Paramètres opérationnels ────────────────────────────────
    async function renderConfig() {
      const cfg = await api('/admin/config');
      const rows = Object.entries(cfg).map(([key, value]) => `
        <tr data-key="${key}">
          <td>${key}</td>
          <td><input type="number" class="cfg-value" value="${value}" /></td>
          <td><button class="secondary cfg-save">Enregistrer</button><span class="save-hint">✓ enregistré</span></td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Paramètre</th><th>Valeur</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <button id="reset-config" class="secondary">Charger les paramètres par défaut</button>
          </div>`;
      return panelWrap('config-panel', 'Paramètres opérationnels', 'effectifs sous ~10s, sans redémarrage', body);
    }

    function wireConfig() {
      document.querySelectorAll('.cfg-save').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const key = tr.dataset.key;
          const value = tr.querySelector('.cfg-value').value;
          await api(`/admin/config/${key}`, { method: 'POST', body: JSON.stringify({ value }) });
          const hint = e.target.nextElementSibling;
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1500);
        });
      });
      document.getElementById('reset-config')?.addEventListener('click', async () => {
        if (!confirm("Charger les paramètres par défaut ? Tout réglage personnalisé sera écrasé.")) return;
        await api('/admin/config/reset', { method: 'POST' });
        await refresh();
      });
    }

    // ── Mesure de satisfaction (pouce + NPS + suggestions) ───────
    // Le tracking de clic n'a pas de bascule ici : signal passif,
    // toujours actif (voir docsearch-api/search_api.py).
    async function renderEngagement() {
      const cfg = await api('/engagement-config');
      const body = `
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="eng-feedback" ${cfg.feedback_enabled ? 'checked' : ''} />
              Pouce haut/bas après chaque recherche
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="eng-nps" ${cfg.nps_enabled ? 'checked' : ''} />
              Popup NPS occasionnelle (toutes les 20 recherches, cooldown 30 jours)
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="eng-suggestions" ${cfg.suggestions_enabled ? 'checked' : ''} />
              Lien "Suggérer une idée" dans l'en-tête de recherche
            </label>
          </div>
          <p class="muted" style="margin-top:8px;">
            Le tracking de clic sur les résultats reste toujours actif — c'est un signal passif,
            sans widget ni friction pour l'utilisateur, pas de bascule nécessaire.
          </p>`;
      return panelWrap('engagement-panel', 'Mesure de satisfaction', "effectif immédiatement, pas de redémarrage", body);
    }

    function wireEngagement() {
      document.getElementById('eng-feedback')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {
          await api('/admin/engagement-config', { method: 'POST', body: JSON.stringify({ feedback_enabled: checked }) });
        } catch (err) {
          e.target.checked = !checked;
          alert(`Erreur : ${err.message}`);
        }
      });
      document.getElementById('eng-nps')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {
          await api('/admin/engagement-config', { method: 'POST', body: JSON.stringify({ nps_enabled: checked }) });
        } catch (err) {
          e.target.checked = !checked;
          alert(`Erreur : ${err.message}`);
        }
      });
      document.getElementById('eng-suggestions')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {
          await api('/admin/engagement-config', { method: 'POST', body: JSON.stringify({ suggestions_enabled: checked }) });
        } catch (err) {
          e.target.checked = !checked;
          alert(`Erreur : ${err.message}`);
        }
      });
    }

    // ── Interface (bascules sans rapport avec la satisfaction) ───
    async function renderUiConfig() {
      const cfg = await api('/ui-config');
      const body = `
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-chat" ${cfg.chat_enabled ? 'checked' : ''} />
              Lien "Assistant IA" dans l'en-tête de recherche
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-footer" ${cfg.footer_enabled ? 'checked' : ''} />
              Pied de page de la page de recherche
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-admin-links" ${cfg.admin_links_enabled ? 'checked' : ''} />
              Liens "Administration"/"Statistiques" (même pour les utilisateurs autorisés)
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-export" ${cfg.export_enabled ? 'checked' : ''} />
              Export des résultats de recherche (XLSX/DOCX)
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-help" ${cfg.help_enabled ? 'checked' : ''} />
              Lien "❓ Aide" dans l'en-tête de recherche (et raccourci clavier "?")
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-lists" ${cfg.collections_enabled ? 'checked' : ''} />
              Sélection de documents et collections personnelles ("📋 Mes collections")
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-custom-keywords" ${cfg.custom_keywords_enabled ? 'checked' : ''} />
              Ajout/retrait de mots-clés personnalisés sur les documents (type fichier)
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="ui-alerts" ${cfg.alerts_enabled ? 'checked' : ''} />
              Alertes sur recherches sauvegardées ("🔔 Alertes" dans l'en-tête)
            </label>
          </div>`;
      return panelWrap('ui-config-panel', 'Interface', "effectif immédiatement, pas de redémarrage", body);
    }

    function wireUiConfig() {
      document.getElementById('ui-chat')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {

    // ── Gabarits d'affichage des résultats ────────────────────────
    // Composition de chaque style nommé (voir la colonne "Affichage" du
    // panneau "Toutes les sources", qui assigne une source à l'un de ces
    // styles) — quels champs afficher, dépliable ou non. Une boucle sur
    // les styles retournés par l'API, pas de bloc codé en dur par style :
    // un nouveau style ajouté côté display_styles_config.py apparaît ici
    // sans changement de ce fichier.
    const DISPLAY_STYLE_LABELS = {
      default: 'Défaut', compact: 'Compact', minimal: 'Minimal',
      dense: 'Dense', essentiel: 'Essentiel', complet_sans_extrait: 'Complet sans extrait',

    function wireDisplayStyles() {

    // ── Toutes les sources (vue unifiée fichier/SQL/web) ─────────
    // Complète les panneaux CRUD dédiés (Sources fichiers / Sources SQL /
    // Sources web ci-dessous, qui gèrent chacun les champs propres à leur type)
    // par une liste transverse : compte de documents + deux bascules
    // indépendantes, par source, quel que soit son type :
    //   - "Recherche" : visibilité dans /search (voir set_searchable()).
    //   - "Collections" : autorise (ou non) l'ajout de ses documents à une
    //     collection ("Mes collections") — voir set_collectable() et
    //     add_collection_document() dans search_api.py. Une source peut
    //     très bien rester cherchable tout en étant exclue des collections
    //     (ex: contenu volatile qu'on ne veut pas voir "épinglé" par un
    //     utilisateur), les deux bascules sont donc bien séparées.
    // Aucune des deux n'affecte l'ingestion (watcher/sql-worker/
    // web-worker continuent toujours normalement).
    const TYPE_LABELS = { file: 'Bureautique', sql: 'SQL', web: 'Web' };

    async function renderAllSources() {
      // Les options du menu "Affichage" viennent de /display-styles (pas
      // d'énumération codée en dur ici) — sinon ce menu se retrouve
      // désynchronisé du catalogue réel dès qu'un style est ajouté/retiré
      // côté display_styles_config.py, comme il l'était resté figé à
      // "default"/"compact" lors du passage à 6 styles.
      const [sources, styleDefs] = await Promise.all([
        api('/admin/all-sources'),
        api('/display-styles'),
      ]);
      const styleOptionsHtml = (current) => Object.keys(styleDefs).map(name =>
        `<option value="${name}" ${current === name ? 'selected' : ''}>${DISPLAY_STYLE_LABELS[name] || name}</option>`
      ).join('');
      const rows = Object.entries(sources)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([name, s]) => `
        <tr data-name="${name}" data-type="${s.type}">
          <td>${escapeHtml(s.label)}</td>
          <td>${TYPE_LABELS[s.type] || s.type}</td>
          <td class="muted">${s.es_index}</td>
          <td class="muted">${escapeHtml(s.description || '')}</td>
          <td style="text-align:right;">${(s.indexed ?? 0).toLocaleString('fr-FR')}</td>
          <td style="text-align:right;">${formatBytes(s.size_bytes)}</td>
          <td>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" class="src-searchable" ${s.searchable ? 'checked' : ''} />
              <span class="muted">${s.searchable ? 'activée' : 'désactivée'}</span>
            </label>
          </td>
          <td>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" class="src-collectable" ${s.collectable ? 'checked' : ''} />
              <span class="muted">${s.collectable ? 'autorisée' : 'bloquée'}</span>
            </label>
          </td>
          <td>
            <select class="src-display-style">
              ${styleOptionsHtml(s.display_style)}
            </select>
          </td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Source</th><th>Type</th><th>Index ES</th><th>Description</th><th style="text-align:right;">Documents</th><th style="text-align:right;">Taille</th><th>Recherche</th><th>Collections</th><th>Affichage</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="9" class="muted">Aucune source enregistrée.</td></tr>'}</tbody>
          </table>`;
      return panelWrap('allsources-panel', 'Toutes les sources', 'documents bureautiques, web et SQL confondus', body);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 o';
      const units = ['o', 'Ko', 'Mo', 'Go', 'To'];
      let i = 0;
      let value = bytes;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return `${value.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    // Édition de libellé/description, générique, partagée par les panneaux
    // Sources fichiers / Sources SQL / Sources web — contrairement à l'ancien
    // renommage, ceci ne touche jamais au nom (clé de registre) d'une
    // source, donc aucune répercussion sur les documents déjà indexés
    // n'est nécessaire.
    async function editSourceFieldPrompt(name, endpointBase, field, currentValue, promptLabel) {
      const value = prompt(`${promptLabel} pour la source '${name}' :`, currentValue || '');
      if (value === null || value.trim() === currentValue) return false;
      const trimmed = value.trim();
      if (field === 'label' && !trimmed) { alert('Le libellé ne peut pas être vide.'); return false; }
      try {
        await api(`${endpointBase}/${encodeURIComponent(name)}/${field}`, {
          method: 'POST',
          body: JSON.stringify({ [field]: trimmed }),
        });
        return true;
      } catch (e) {
        alert(`Erreur : ${e.message}`);
        return false;
      }
    }

    // ── Sources d'indexation ─────────────────────────────────────
    // État partagé entre les panneaux qui doivent cibler UNE source
    // (filtres de chemin, scan) — persiste le choix de l'utilisateur
    // d'un rafraîchissement à l'autre plutôt que de revenir à
    // "documents" à chaque fois.
    let fileSourcesCache = { documents: { es_index: 'documents', folder: '', label: 'Documents' } };
    let selectedFilterSource = 'documents';
    let selectedScanSource = 'documents';
    let selectedFiletypeSource = 'documents';

    function fileSourceOptions(selected) {

    async function renderFileSources() {

            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <input type="text" id="new-file-name" placeholder="nom (ex: finance)" />
            <input type="text" id="new-file-index" placeholder="index ES (ex: finance_docs)" />
            <input type="text" id="new-file-subfolder" placeholder="sous-dossier (défaut : = nom)" />

            Créez d'abord le sous-dossier sur l'hôte (SOURCES_ROOT/&lt;nom&gt;), puis enregistrez-le

    function wireFileSources() {

    // ── Sources SQL ──────────────────────────────────────────────
    // Résultat d'une requête PostgreSQL/MySQL indexé dans son propre
    // index ES (voir docsearch-ingestion/app/sql_indexer.py). La liste
    // récapitule chaque source ; "Modifier" ouvre un formulaire complet
    // (requête + mapping colonne -> champ ES ligne par ligne, plus
    // besoin d'écrire du JSON à la main) pré-rempli avec ses valeurs
    // actuelles — le même formulaire sert à la création (name/es_index
    // vides et modifiables) et à l'édition (name/es_index figés : les
    // changer reviendrait à créer une source distincte plutôt qu'à
    // modifier celle-ci, voir sql_sources_config.add_source). Contraire-
    // ment aux sources fichiers, il n'y a pas de bouton "lancer
    // maintenant" ici : le passage effectif reste au sql-worker déjà actif
    // (poll automatique à son propre intervalle), l'admin ne gère que le
    // registre — l'API ne résout jamais le DSN et ne se connecte jamais
    // à une base SQL.
    let sqlSourcesCache = {};
    let sqlDsnsCache = [];
    const SQL_ES_TYPES = ["keyword", "text", "long", "double", "date", "boolean"];

    async function renderSqlSources() {
      [sqlSourcesCache, sqlDsnsCache] = await Promise.all([
        api('/admin/sql-sources'),
        api('/admin/sql-dsns'),
      ]);
      const rows = Object.entries(sqlSourcesCache).map(([name, s]) => {
        const facetLabels = (s.fields || []).filter(f => f.facet).map(f => f.facet_label || f.es_field);
        return `
        <tr data-name="${name}">
          <td>${name}</td>
          <td>${s.label || ''}</td>
          <td>${s.es_index}</td>
          <td style="text-align:right;">${s.poll_interval_seconds}s</td>
          <td class="muted">${s.description || ''}</td>
          <td class="muted">${facetLabels.map(escapeHtml).join(', ') || '—'}</td>
          <td><button class="secondary sql-src-edit">Modifier</button></td>
          <td><button class="danger sql-src-delete">Retirer</button></td>
        </tr>`;
      }).join('');

      const body = `
          <table>
            <thead><tr><th>Nom</th><th>Libellé</th><th>Index ES</th><th>Intervalle</th><th>Description</th><th>Facettes</th><th></th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="8" class="muted">Aucune source SQL.</td></tr>'}</tbody>
          </table>

          <div id="sql-form-container" style="margin-top:14px;"></div>
          <button id="sql-new-source-btn" class="secondary" style="margin-top:10px;">+ Nouvelle source SQL</button>

          <datalist id="sql-dsn-names">
            ${sqlDsnsCache.map(d => `<option value="${d.name}"></option>`).join('')}
          </datalist>

          <h3 style="margin-top:22px;">DSN chiffrés (enregistrés depuis ce panneau)</h3>
          <table>
            <thead><tr><th>Nom</th><th>Indice (schéma + hôte, sans identifiants)</th><th></th></tr></thead>
            <tbody>${sqlDsnsCache.map(d => `
              <tr data-name="${d.name}">
                <td>${d.name}</td>
                <td class="muted">${d.hint}</td>
                <td><button class="danger sql-dsn-delete">Retirer</button></td>
              </tr>`).join('') || '<tr><td colspan="3" class="muted">Aucun DSN enregistré ici.</td></tr>'}
            </tbody>
          </table>
          <div style="margin-top:14px;">
            <div class="row">
              <input type="text" id="new-dsn-name" placeholder="nom (ex: CLIENTS_PG_DSN)" />
              <input type="password" id="new-dsn-value" placeholder="DSN complet (ex: postgresql+psycopg2://user:motdepasse@host:5432/db)" style="flex:2;" />
            </div>
            <button id="add-sql-dsn">Enregistrer le DSN</button>
          </div>
          <p class="muted" style="margin-top:8px;">
            Alternative à une variable d'environnement dans le <code>.env</code> de docsearch-infra : ce
            DSN est chiffré (Fernet) puis stocké dans Redis, sans redémarrage de conteneur, sans accès
            SSH/hôte. Il n'est plus jamais réaffiché après l'enregistrement — seul l'indice ci-dessus
            (schéma + hôte, jamais les identifiants) reste consultable. Nécessite
            <code>DSN_ENCRYPTION_KEY</code> configurée côté docsearch-api ET docsearch-ingestion (voir
            .env.example).
          </p>`;
      return panelWrap('sqlsources-panel', 'Sources SQL', 'requêtes PostgreSQL/MySQL indexées, réconciliées à chaque passage', body);
    }

    // Une ligne du tableau de mapping colonne SQL -> champ ES. `f` peut
    // être partiel/vide (nouvelle ligne ajoutée par l'utilisateur).
    // "Facette" : affiche ce champ comme facette dans la sidebar de
    // recherche (index.html) dès que cette source est en jeu — voir
    // search_api.py:_active_custom_facets(). Seuls keyword/boolean le
    // permettent (agrégation "terms" sans doc_values sinon impossible),
    // d'où la case désactivée pour les autres types (voir wireSqlSourceForm).
    function sqlFieldRowHtml(f) {
      f = f || {};
      const typeOptions = SQL_ES_TYPES.map(t =>
        `<option value="${t}" ${f.es_type === t ? 'selected' : ''}>${t}</option>`).join('');
      const facetable = !f.es_type || f.es_type === 'keyword' || f.es_type === 'boolean';
      return `
        <tr class="sql-field-row">
          <td><input type="text" class="sql-field-column" value="${escapeHtml(f.column || '')}" placeholder="colonne SQL" /></td>
          <td><input type="text" class="sql-field-esfield" value="${escapeHtml(f.es_field || '')}" placeholder="champ ES" /></td>
          <td><select class="sql-field-estype">${typeOptions}</select></td>
          <td><input type="text" class="sql-field-analyzer" value="${escapeHtml(f.analyzer || '')}" placeholder="ex: french (texte seul.)" /></td>
          <td style="text-align:center;">
            <input type="checkbox" class="sql-field-facet" ${f.facet ? 'checked' : ''} ${facetable ? '' : 'disabled'}
                   title="Afficher ce champ comme facette de recherche (keyword/boolean uniquement)" />
          </td>
          <td><input type="text" class="sql-field-facet-label" value="${escapeHtml(f.facet_label || '')}" placeholder="libellé (ex: Bureau)" /></td>
          <td><button type="button" class="danger sql-field-remove-row" title="Retirer cette colonne">✕</button></td>
        </tr>`;
    }

    // Formulaire complet (requête + mapping), partagé par la création et
    // l'édition. `name`/`source` absents => création (champs nom/index
    // ES vides et modifiables) ; présents => édition (nom/index ES figés,
    // le reste pré-rempli avec les valeurs actuelles).
    function sqlSourceFormHtml(name, source) {
      const isEdit = !!source;
      const fields = (source?.fields?.length ? source.fields : [{ column: 'id', es_field: 'id', es_type: 'keyword' }]);
      return `
        <div class="panel" style="border:1px dashed #185FA5;">
          <h3 style="margin-bottom:14px;">${isEdit ? `Modifier « ${escapeHtml(name)} »` : 'Nouvelle source SQL'}</h3>
          <div class="row">
            <input type="text" id="sql-form-name" placeholder="nom (ex: clients_pg)" value="${escapeHtml(name || '')}" ${isEdit ? 'disabled' : ''} />
            <select id="sql-form-dbtype" title="Sert à vérifier que le DSN résolu correspond bien au type déclaré (préfixe postgresql:// ou mysql://), avant même de tenter la connexion.">
              <option value="postgresql" ${source?.db_type !== 'mysql' ? 'selected' : ''}>postgresql</option>
              <option value="mysql" ${source?.db_type === 'mysql' ? 'selected' : ''}>mysql</option>
            </select>
            <input type="text" id="sql-form-connref" list="sql-dsn-names" value="${escapeHtml(source?.connection_ref || '')}"
                   placeholder="connection_ref (ex: CLIENTS_PG_DSN — variable d'environnement ou DSN enregistré ci-dessous)" />
          </div>
          <div class="row">
            <input type="text" id="sql-form-index" placeholder="index ES (ex: clients_pg_sql)" value="${escapeHtml(source?.es_index || '')}" ${isEdit ? 'disabled' : ''} />
            <input type="text" id="sql-form-idcol" placeholder="colonne ID (ex: id)" value="${escapeHtml(source?.id_column || 'id')}" />
            <input type="number" id="sql-form-interval" placeholder="intervalle (s)" value="${source?.poll_interval_seconds || 300}" min="10" style="max-width:130px;" />
          </div>
          <div class="row">
            <input type="text" id="sql-form-label" placeholder="libellé (optionnel)" value="${escapeHtml(source?.label || '')}" />
            <input type="text" id="sql-form-description" placeholder="description (optionnel)" value="${escapeHtml(source?.description || '')}" />
          </div>
          <div class="row">
            <textarea id="sql-form-query" rows="3" style="flex:1;font:13px/1.4 monospace;padding:6px 8px;border:1px solid #d5d5ce;border-radius:6px;"
                      placeholder="SELECT id, nom, email FROM clients WHERE actif = true">${escapeHtml(source?.query || '')}</textarea>
          </div>

          <h4 style="margin:16px 0 8px;">Mapping colonnes → champs Elasticsearch</h4>
          <table>
            <thead><tr><th>Colonne SQL</th><th>Champ ES</th><th>Type ES</th><th>Analyseur</th><th>Facette</th><th>Libellé facette</th><th></th></tr></thead>
            <tbody id="sql-fields-rows">${fields.map(sqlFieldRowHtml).join('')}</tbody>
          </table>
          <button type="button" class="secondary" id="sql-add-field-row" style="margin-top:8px;">+ Ajouter une colonne</button>

          <p class="muted" style="margin-top:12px;">
            <code>connection_ref</code> est le NOM d'une variable d'environnement contenant le DSN complet
            (définie dans le .env de docsearch-infra) OU le nom d'un DSN chiffré enregistré ci-dessous —
            la variable d'environnement reste TOUJOURS prioritaire si elle existe. Le DSN en clair ne
            transite jamais par ici ni par Redis dans le premier cas ; dans le second, il est chiffré avant
            stockage. "Analyseur" n'a de sens que pour le type "text" (ex: french) — laisser vide sinon.
            "Facette" ajoute une section de filtre dans la sidebar de recherche dès que cette source est
            interrogée (limité aux types keyword/boolean) ; "Libellé facette" est le titre affiché
            (ex: "Bureau") — vide, le nom du champ ES est utilisé tel quel.
          </p>

          <div style="display:flex;gap:8px;margin-top:8px;">
            <button id="sql-form-save">Enregistrer</button>
            <button type="button" class="secondary" id="sql-form-cancel">Annuler</button>
          </div>
        </div>`;
    }

    function wireSqlSourceForm(existingName) {
      document.getElementById('sql-add-field-row')?.addEventListener('click', () => {
        document.getElementById('sql-fields-rows').insertAdjacentHTML('beforeend', sqlFieldRowHtml());
      });
      document.querySelectorAll('.sql-field-remove-row').forEach(btn => {
        btn.addEventListener('click', (e) => e.target.closest('tr').remove());
      });
      // Délégation (plutôt qu'un ré-attachement par ligne) : couvre aussi
      // les lignes ajoutées après coup via "+ Ajouter une colonne", sans
      // avoir à re-wirer quoi que ce soit à chaque ajout. Un champ "text"
      // n'accepte pas de facette (voir sql_sources_config.py:
      // _validate_fields) — la case est désactivée et décochée dès que le
      // type choisi sort de keyword/boolean.
      document.getElementById('sql-fields-rows')?.addEventListener('change', (e) => {
        if (!e.target.classList.contains('sql-field-estype')) return;
        const facetCb = e.target.closest('tr').querySelector('.sql-field-facet');
        const facetable = e.target.value === 'keyword' || e.target.value === 'boolean';
        facetCb.disabled = !facetable;
        if (!facetable) facetCb.checked = false;
      });
      document.getElementById('sql-form-cancel')?.addEventListener('click', () => {
        document.getElementById('sql-form-container').innerHTML = '';
      });
      document.getElementById('sql-form-save')?.addEventListener('click', async () => {
        const name = existingName || document.getElementById('sql-form-name').value.trim();
        const db_type = document.getElementById('sql-form-dbtype').value;
        const connection_ref = document.getElementById('sql-form-connref').value.trim();
        const es_index = document.getElementById('sql-form-index').value.trim();
        const id_column = document.getElementById('sql-form-idcol').value.trim();
        const poll_interval_seconds = parseInt(document.getElementById('sql-form-interval').value, 10) || 300;
        const query = document.getElementById('sql-form-query').value.trim();
        const label = document.getElementById('sql-form-label').value.trim() || null;
        const description = document.getElementById('sql-form-description').value.trim() || null;

        const fields = Array.from(document.querySelectorAll('#sql-fields-rows .sql-field-row')).map(row => {
          const column      = row.querySelector('.sql-field-column').value.trim();
          const es_field    = row.querySelector('.sql-field-esfield').value.trim();
          const es_type     = row.querySelector('.sql-field-estype').value;
          const analyzer    = row.querySelector('.sql-field-analyzer').value.trim() || null;
          const facet       = row.querySelector('.sql-field-facet').checked;
          const facet_label = row.querySelector('.sql-field-facet-label').value.trim() || null;
          return { column, es_field, es_type, analyzer, facet, facet_label };
        }).filter(f => f.column && f.es_field);

        if (!name || !connection_ref || !es_index || !id_column || !query || !fields.length) {
          alert('Tous les champs sont requis (nom, connection_ref, index ES, colonne ID, requête, au moins une colonne de mapping).');
          return;
        }
        try {
          await api('/admin/sql-sources', {
            method: 'POST',
            body: JSON.stringify({ name, db_type, connection_ref, query, id_column, es_index, fields, poll_interval_seconds, label, description }),
          });
          document.getElementById('sql-form-container').innerHTML = '';
          await refresh();
        } catch (e) {
          alert(`Erreur : ${e.message}`);
        }
      });
    }

    function wireSqlSources() {
      document.querySelectorAll('.sql-src-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const name = e.target.closest('tr').dataset.name;
          const container = document.getElementById('sql-form-container');
          container.innerHTML = sqlSourceFormHtml(name, sqlSourcesCache[name]);
          wireSqlSourceForm(name);
          container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
      });
      document.querySelectorAll('.sql-src-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer la source SQL '${name}' ? Son index Elasticsearch et ses documents ne seront PAS supprimés.`)) return;
          await api(`/admin/sql-sources/${name}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('sql-new-source-btn')?.addEventListener('click', () => {
        const container = document.getElementById('sql-form-container');
        container.innerHTML = sqlSourceFormHtml(null, null);
        wireSqlSourceForm(null);
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      document.querySelectorAll('.sql-dsn-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer le DSN chiffré '${name}' ? Toute source SQL dont le connection_ref pointe vers ce nom échouera à son prochain passage (sauf si une variable d'environnement du même nom existe).`)) return;
          try {
            await api(`/admin/sql-dsns/${encodeURIComponent(name)}`, { method: 'DELETE' });
            await refresh();
          } catch (e) {
            alert(`Erreur : ${e.message}`);
          }
        });
      });

      document.getElementById('add-sql-dsn')?.addEventListener('click', async () => {
        const name = document.getElementById('new-dsn-name').value.trim();
        const dsn  = document.getElementById('new-dsn-value').value.trim();
        if (!name || !dsn) {
          alert('Le nom et le DSN sont tous les deux requis.');
          return;
        }
        try {
          await api('/admin/sql-dsns', { method: 'POST', body: JSON.stringify({ name, dsn }) });
          document.getElementById('new-dsn-value').value = ''; // jamais laisser le DSN dans le champ après envoi
          await refresh();
        } catch (e) {
          alert(`Erreur : ${e.message}`);
        }
      });
    }

    // ── Sources web (Elastic Open Web Crawler) ──────────────────
    // Un site crawlé par Elastic Open Web Crawler écrit dans un index ES
    // intermédiaire (crawl_index, son propre schéma) — web_indexer.py
    // (docsearch-ingestion) le relit à intervalle régulier pour le
    // transformer vers le schéma DocSearch dans es_index. Comme pour les
    // sources SQL, il n'y a pas de bouton "lancer maintenant" ni de
    // configuration du crawl lui-même ici : ce panneau ne gère que le
    // registre crawl_index -> es_index (le crawl est configuré à part,
    // voir docsearch-infra/crawlers/*.yml, et tourne selon son propre
    // planning). web-worker (déjà actif) prend en compte la nouvelle
    // source sous ~5s, sans redémarrage.
    let webSourcesCache = {};

    async function renderWebSources() {
      webSourcesCache = await api('/admin/web-sources');
      const rows = Object.entries(webSourcesCache).map(([name, s]) => `
        <tr data-name="${name}">
          <td>${name}</td>
          <td>${s.label}</td>
          <td class="muted">${s.crawl_index}</td>
          <td>${s.es_index}</td>
          <td>${s.acl_public ? 'public' : 'privé'}</td>
          <td style="text-align:right;">${s.poll_interval_seconds}s</td>
          <td class="muted">${s.description || ''}</td>
          <td>${s.paused
            ? '<span class="muted">⏸ suspendu</span>'
            : '<span style="color:#1f9254;">▶ actif</span>'}</td>
          <td><button class="secondary web-src-toggle-pause">${s.paused ? 'Reprendre' : 'Suspendre'}</button></td>
          <td><button class="secondary web-src-edit-label">Modifier le libellé</button></td>
          <td><button class="secondary web-src-edit-description">Modifier la description</button></td>
          <td><button class="danger web-src-delete">Retirer</button></td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Nom</th><th>Libellé</th><th>Index de crawl</th><th>Index ES final</th><th>ACL</th><th>Intervalle</th><th>Description</th><th>Crawl</th><th></th><th></th><th></th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="12" class="muted">Aucune source web.</td></tr>'}</tbody>
          </table>
          <p class="muted" style="margin-top:8px;">
            « Suspendre » arrête la RÉPERCUSSION vers DocSearch (web-worker cesse de relire l'index
            de crawl) — le conteneur Elastic Open Web Crawler lui-même, s'il tourne en planification
            continue, n'est pas piloté depuis cette interface et continue son cycle indépendamment.
          </p>
          <div style="margin-top:14px;">
            <div class="row">
              <input type="text" id="new-web-name" placeholder="nom (ex: cc_decisions)" />
              <input type="text" id="new-web-crawlindex" placeholder="index de crawl (output_index du crawler)" />
              <input type="text" id="new-web-esindex" placeholder="index ES final (ex: cc_decisions)" />
            </div>
            <div class="row">
              <label class="muted" for="new-web-public">Contenu public (sans authentification)</label>
              <input type="checkbox" id="new-web-public" checked style="flex:0;" />
              <input type="number" id="new-web-interval" placeholder="intervalle (s)" value="3600" min="30" style="max-width:130px;" />
              <input type="text" id="new-web-label" placeholder="libellé (optionnel)" />
            </div>
            <div class="row">
              <input type="text" id="new-web-description" placeholder="description (optionnel)" />
            </div>
            <button id="add-web-source">Ajouter</button>
          </div>
          <p class="muted" style="margin-top:8px;">
            L'index de crawl doit correspondre au <code>output_index</code> déclaré dans la config
            Elastic Open Web Crawler du site (<code>docsearch-infra/crawlers/*.yml</code>) — jamais le
            même que l'index ES final, qui reçoit le contenu transformé au schéma DocSearch.
          </p>`;
      return panelWrap('websources-panel', 'Sources web', 'sites crawlés par Elastic Open Web Crawler', body);
    }

    function wireWebSources() {
      document.querySelectorAll('.web-src-toggle-pause').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const name = tr.dataset.name;
          const currentlyPaused = e.target.textContent.trim() === 'Reprendre';
          await api(`/admin/web-sources/${encodeURIComponent(name)}/pause`, {
            method: 'POST',
            body: JSON.stringify({ paused: !currentlyPaused }),
          });
          await refresh();
        });
      });
      document.querySelectorAll('.web-src-edit-label').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          const current = webSourcesCache[name]?.label || name;
          if (await editSourceFieldPrompt(name, '/admin/web-sources', 'label', current, 'Nouveau libellé')) await refresh();
        });
      });
      document.querySelectorAll('.web-src-edit-description').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          const current = webSourcesCache[name]?.description || '';
          if (await editSourceFieldPrompt(name, '/admin/web-sources', 'description', current, 'Nouvelle description')) await refresh();
        });
      });
      document.querySelectorAll('.web-src-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer la source web '${name}' ? Ses index Elasticsearch et ses documents ne seront PAS supprimés.`)) return;
          await api(`/admin/web-sources/${name}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-web-source')?.addEventListener('click', async () => {
        const name           = document.getElementById('new-web-name').value.trim();
        const crawl_index    = document.getElementById('new-web-crawlindex').value.trim();
        const es_index       = document.getElementById('new-web-esindex').value.trim();
        const acl_public     = document.getElementById('new-web-public').checked;
        const poll_interval_seconds = parseInt(document.getElementById('new-web-interval').value, 10) || 3600;
        const label          = document.getElementById('new-web-label').value.trim() || null;
        const description    = document.getElementById('new-web-description').value.trim() || null;

        if (!name || !crawl_index || !es_index) {
          alert('Nom, index de crawl et index ES final sont requis.');
          return;

        try {
          await api('/admin/web-sources', {
            method: 'POST',
            body: JSON.stringify({ name, crawl_index, es_index, acl_public, poll_interval_seconds, label, description }),
          });
          await refresh();
        } catch (e) {
          alert(`Erreur : ${e.message}`);
        }
      });
    }

    // ── Filtres de chemin ───────────────────────────────────────
    async function renderPathFilters() {
      if (!fileSourcesCache[selectedFilterSource]) selectedFilterSource = 'documents';
      const cfg = await api(`/admin/path-filters?source=${encodeURIComponent(selectedFilterSource)}`);
      const tag = (p, kind) => `<span class="tag">${p}<button data-pattern="${p}" data-kind="${kind}" class="rm-filter">✕</button></span>`;
      const body = `
          <div class="row">
            <label class="muted" for="filter-source">Source :</label>
            <select id="filter-source">${fileSourceOptions(selectedFilterSource)}</select>
          </div>

          <div class="muted" style="margin-top:10px;">Liste noire (exclus)</div>
          <div class="tag-list" id="excluded-tags">${(cfg.excluded || []).map(p => tag(p, 'excluded')).join('') || '<span class="muted">aucune</span>'}</div>

          <div class="muted" style="margin-top:14px;">Liste blanche (si non vide, seuls ces chemins sont indexés)</div>
          <div class="tag-list" id="included-tags">${(cfg.included || []).map(p => tag(p, 'included')).join('') || '<span class="muted">aucune — tout est indexé sauf la liste noire</span>'}</div>

          <div class="row" style="margin-top:16px;">
            <input type="text" id="new-pattern" placeholder="ex: confidentiel ou */tmp" />
            <button id="add-exclude" class="secondary">Exclure</button>
            <button id="add-include" class="secondary">Inclure (liste blanche)</button>
          </div>

          <hr style="margin:16px 0;border:none;border-top:1px solid #eee;" />

          <div class="muted">Purger l'index existant selon un motif</div>
          <div class="row" style="margin-top:8px;">
            <input type="text" id="purge-pattern" placeholder="motif à purger" />
            <button id="purge-preview" class="secondary">Aperçu</button>
          </div>
          <div id="purge-result" class="muted"></div>`;
      return panelWrap('pathfilters-panel', 'Filtres de sous-dossiers', 'motifs glob, relatifs au dossier de la source', body);
    }

    function wirePathFilters() {
      document.getElementById('filter-source')?.addEventListener('change', async (e) => {
        selectedFilterSource = e.target.value;
        await refresh();
      });
      document.querySelectorAll('.rm-filter').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          await api('/admin/path-filters/remove', { method: 'POST', body: JSON.stringify({ pattern: e.target.dataset.pattern, source: selectedFilterSource }) });
          await refresh();
        });
      });
      document.getElementById('add-exclude')?.addEventListener('click', async () => {
        const pattern = document.getElementById('new-pattern').value.trim();
        if (!pattern) return;
        await api('/admin/path-filters/exclude', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource }) });
        await refresh();
      });
      document.getElementById('add-include')?.addEventListener('click', async () => {
        const pattern = document.getElementById('new-pattern').value.trim();
        if (!pattern) return;
        await api('/admin/path-filters/include', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource }) });
        await refresh();
      });

      let lastPreviewPattern = null;
      document.getElementById('purge-preview')?.addEventListener('click', async () => {
        const pattern = document.getElementById('purge-pattern').value.trim();
        if (!pattern) return;
        const resultEl = document.getElementById('purge-result');
        const res = await api('/admin/purge-path', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource, dry_run: true }) });
        lastPreviewPattern = pattern;
        resultEl.innerHTML = `${res.matched} document(s) correspondent à '${pattern}' (source '${selectedFilterSource}'). ` +
          (res.matched > 0 ? `<button id="purge-confirm" class="danger" style="margin-left:8px;">Confirmer la suppression</button>` : '');
        document.getElementById('purge-confirm')?.addEventListener('click', async () => {
          if (!confirm(`Supprimer définitivement ${res.matched} document(s) de l'index (les fichiers sur le disque ne sont pas touchés) ?`)) return;
          const real = await api('/admin/purge-path', { method: 'POST', body: JSON.stringify({ pattern: lastPreviewPattern, source: selectedFilterSource, dry_run: false }) });
          resultEl.textContent = `${real.matched} document(s) supprimé(s) de l'index.`;
        });
      });
    }

    // ── Déclenchement d'un scan ─────────────────────────────────
    function renderScan() {
      if (!fileSourcesCache[selectedScanSource]) selectedScanSource = 'documents';
      const body = `
          <p class="muted">Publie les fichiers d'UNE source sur Kafka pour indexation par les workers actifs (pool partagé entre toutes les sources) — ne bloque pas, suivre la progression dans "État des composants" ci-dessus.</p>
          <div class="row" style="margin-top:12px;">
            <label class="muted" for="scan-source">Source :</label>
            <select id="scan-source">${fileSourceOptions(selectedScanSource)}</select>
            <input type="text" id="scan-subfolder" placeholder="sous-dossier (vide = dossier complet)" />
            <button id="scan-launch">Lancer un scan</button>
          </div>
          <div id="scan-result" class="muted"></div>`;
      return panelWrap('scan-panel', 'Indexation', null, body);
    }

    function wireScan() {
      document.getElementById('scan-source')?.addEventListener('change', (e) => {
        selectedScanSource = e.target.value;
      });
      document.getElementById('scan-launch')?.addEventListener('click', async () => {
        const subfolder = document.getElementById('scan-subfolder').value.trim() || null;
        const btn = document.getElementById('scan-launch');
        btn.disabled = true;
        try {
          const res = await api('/admin/scan', { method: 'POST', body: JSON.stringify({ source: selectedScanSource, subfolder }) });
          document.getElementById('scan-result').textContent =
            `Scan démarré (source '${res.source}', ${res.subfolder}). Suivre la progression dans "État des composants".`;
        } finally {
          btn.disabled = false;
        }
      });
    }

    // ── Orchestration ───────────────────────────────────────────
    async function refresh() {
      // Sources d'abord et à part (await, pas dans le lot ci-dessous) :
      // renderFiletypes()/renderPathFilters()/renderScan() lisent
      // fileSourcesCache de façon SYNCHRONE pour peupler leur <select> — il
      // doit déjà être à jour avant qu'ils s'exécutent, un
      // Promise.allSettled ne garantit pas cet ordre entre promesses
      // lancées en parallèle.
      let sourcesResult;
      try {
        sourcesResult = { status: 'fulfilled', value: await renderFileSources() };
      } catch (e) {
        sourcesResult = { status: 'rejected', reason: e };
      }

      const labels = ['Sources fichiers', 'État des composants', 'Types de fichiers',
                      'Paramètres opérationnels', 'Filtres de sous-dossiers', 'Sources SQL', 'Sources web',
                      'Toutes les sources', 'Mesure de satisfaction', 'Interface', 'Gabarits d\'affichage'];
      const results = [sourcesResult, ...await Promise.allSettled([
        renderStatus(), renderFiletypes(), renderConfig(), renderPathFilters(),
        renderSqlSources(), renderWebSources(), renderAllSources(), renderEngagement(), renderUiConfig(),
        renderDisplayStyles(),
      ])];

      // Un 401/403 sur N'IMPORTE laquelle de ces routes signifie que le
      // même contrôle d'accès a échoué pour toutes (appliqué
      // uniformément à /admin/*) — un seul bandeau plein écran est plus
      // clair que cinq messages "Accès refusé" redondants.
      const rejected    = results.filter(r => r.status === 'rejected').map(r => r.reason);
      const authFailure = rejected.find(e => e.status === 401 || e.status === 403);
      if (authFailure) {
        $app.innerHTML = `<div class="error-banner"><strong>Accès refusé.</strong> ${authFailure.message}</div>`;
        return;
      }

      // Sinon, chaque panneau affiche son propre message d'erreur à sa
      // place — un index ES absent (503) n'empêche pas les panneaux de
      // configuration (Redis, sans rapport) de s'afficher normalement.
      //
      // Groupage d'AFFICHAGE seulement, par type de source — distinct de
      // l'ordre d'EXÉCUTION ci-dessus, qui doit rester Sources en premier
      // pour peupler fileSourcesCache avant les panneaux qui le lisent de
      // façon synchrone. `results`/`labels` restent indexés dans l'ordre
      // d'exécution, seul l'assemblage ci-dessous change.
      const panelAt = i => {
        const r = results[i];
        return r.status === 'fulfilled'
          ? r.value
          : `<div class="panel"><h2>${labels[i]}</h2><div class="error-banner">${r.reason.message}</div></div>`;
      };
      const group = (id, title, indices, extraHtml = '') => `
        <div class="panel-group${collapsedGroups.has(id) ? ' collapsed' : ''}" id="${id}">
          <div class="section-group-title" onclick="toggleGroupAccordion('${id}')">
            <span>${title}</span><span class="group-caret">▾</span>
          </div>
          <div class="panel-group-body">${indices.map(panelAt).join('')}${extraHtml}</div>
        </div>`;

      $app.innerHTML =
        group('group-overview', 'Vue d\'ensemble', [1, 7]) +
        group('group-file-sources', 'Sources fichiers', [0, 2, 4], renderScan()) +
        group('group-sql-sources', 'Sources SQL', [5]) +
        group('group-web-sources', 'Sources web', [6]) +
        group('group-interface', 'Interface et engagement', [8, 9, 10, 3]);

      wireFileSources();
      wireFiletypes();
      wireConfig();
      wirePathFilters();
      wireSqlSources();
      wireWebSources();
      wireAllSources();
      wireEngagement();
      wireUiConfig();
      wireDisplayStyles();
      wireScan();
      updateToggleAllLabel();
    }

    async function refreshStatusOnly() {
      // Rafraîchissement léger périodique (état des composants
      // seulement) — pas les panneaux de configuration, qu'on ne veut
      // pas réécraser pendant que l'utilisateur les édite. Ciblage par
      // id (pas par position : '.panel' seul serait ambigu maintenant
      // que plusieurs panneaux read-only coexistent).
      const statusPanel = document.getElementById('status-panel');
      if (!statusPanel) return;

      try {
        statusPanel.outerHTML = await renderStatus();
      } catch (e) {
        // Échec transitoire (ES/Redis momentanément indisponible) : le
        // panneau garde son dernier état affiché plutôt que de casser.
      }
    }

    // ── Raccourcis clavier ────────────────────────────────────────
    // Mêmes principes que index.html : jamais actifs pendant une saisie
    // (les panneaux de cette page sont pleins de champs texte/select),
    // pas de garde "résultats visibles" équivalente ici (les panneaux
    // sont toujours affichés une fois la page chargée).
    function isTypingTarget(el) {
      if (!el) return false;
      const tag = el.tagName;
      return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
    }

    document.addEventListener('keydown', (e) => {
      if (isTypingTarget(e.target)) return;

      switch (e.key) {
        case 'r': case 'R':
          e.preventDefault();
          refresh();
          break;
        case 'a': case 'A':
          e.preventDefault();
          toggleAllPanels();
          break;
      }
    });

    refresh();
    setInterval(refreshStatusOnly, 5000);
  </script>
</body>
</html>
