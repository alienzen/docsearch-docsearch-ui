<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DocSearch — Administration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 24px;
              display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 600; color: #185FA5; }
    .header a { font-size: 14px; color: #185FA5; text-decoration: none; margin-left: auto; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; display: flex;
                 flex-direction: column; gap: 24px; }

    .panel { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 20px; }
    .panel h2 small { font-weight: 400; color: #888; font-size: 12px; margin-left: 8px; }

    .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 12px;
                     font-size: 16px; color: #1a1a18; margin: 0; cursor: pointer; user-select: none; }
    .accordion-caret { font-size: 11px; color: #888; flex-shrink: 0; transition: transform 0.15s; }
    .panel.collapsed .accordion-caret { transform: rotate(-90deg); }
    .panel-body { margin-top: 14px; }
    .panel.collapsed .panel-body { display: none; }

    .status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                   gap: 12px; }
    .status-card { border: 1px solid #e5e5e0; border-radius: 8px; padding: 12px; }
    .status-card .name { font-size: 12px; color: #888; margin-bottom: 4px; }
    .status-card .value { font-size: 15px; font-weight: 600; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
    .dot.up { background: #1f9254; }
    .dot.down { background: #c92a2a; }
    .dot.warn { background: #e8990c; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    th { color: #888; font-weight: 500; font-size: 12px; }
    input[type=text], input[type=number] { padding: 5px 8px; border: 1px solid #d5d5ce;
                                            border-radius: 6px; font-size: 13px; width: 100%; }
    input[type=checkbox] { width: 16px; height: 16px; }

    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .row input[type=text] { flex: 1; }

    button { padding: 6px 14px; background: #185FA5; color: #fff; border: none;
             border-radius: 6px; cursor: pointer; font-size: 13px; }
    button.secondary { background: #eee; color: #333; }
    button.danger { background: #c92a2a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: #ececfd; color: #3C3489; padding: 4px 10px; border-radius: 12px;
           font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .tag button { background: none; color: #3C3489; padding: 0; font-size: 14px; line-height: 1; }

    .muted { color: #888; font-size: 12px; }
    .error-banner { background: #fff0f0; border: 1px solid #f5c2c2; color: #a12a2a;
                    padding: 14px 18px; border-radius: 8px; }
    .save-hint { font-size: 11px; color: #1f9254; margin-left: 8px; opacity: 0; transition: opacity .3s; }
    .save-hint.show { opacity: 1; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">DocSearch — Administration</span>
    <a href="/stats.html">Statistiques</a>
    <a href="/">← Recherche</a>
  </header>

  <div class="container" id="app">
    <p class="muted">Chargement…</p>
  </div>

  <script>
    const $app = document.getElementById('app');

    // ── Accordéon ────────────────────────────────────────────────
    // État tenu à part du HTML régénéré à chaque refresh() (toutes les
    // 5s pour État des composants, ou après chaque action) —
    // sans ça, replier une section serait annulé au prochain
    // rafraîchissement. Persisté en localStorage (par navigateur/poste,
    // pas de compte utilisateur dans cette appli) pour retrouver les
    // mêmes panneaux repliés d'une session à l'autre. Rien de replié
    // par défaut si localStorage est vide/indisponible (navigation
    // privée, quota dépassé...).
    const COLLAPSED_STORAGE_KEY = 'docsearch-admin-collapsed-panels';

    function loadCollapsedPanels() {
      try {
        return new Set(JSON.parse(localStorage.getItem(COLLAPSED_STORAGE_KEY) || '[]'));
      } catch (e) {
        return new Set();
      }
    }

    const collapsedPanels = loadCollapsedPanels();

    function toggleAccordion(id) {
      if (collapsedPanels.has(id)) collapsedPanels.delete(id); else collapsedPanels.add(id);
      document.getElementById(id)?.classList.toggle('collapsed', collapsedPanels.has(id));
      try {
        localStorage.setItem(COLLAPSED_STORAGE_KEY, JSON.stringify([...collapsedPanels]));
      } catch (e) {
        // localStorage indisponible : le pli reste actif pour cette session, simplement pas persisté.
      }
    }

    function panelWrap(id, title, subtitle, bodyHtml) {
      return `
        <div class="panel${collapsedPanels.has(id) ? ' collapsed' : ''}" id="${id}">
          <h2 class="panel-header" onclick="toggleAccordion('${id}')">
            <span>${title}${subtitle ? ` <small>${subtitle}</small>` : ''}</span>
            <span class="accordion-caret">▾</span>
          </h2>
          <div class="panel-body">${bodyHtml}</div>
        </div>`;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const err = new Error(body.detail || `Erreur ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return res.json();
    }

    function statusDot(up) {
      if (up === true) return '<span class="dot up"></span>';
      if (up === false) return '<span class="dot down"></span>';
      return '<span class="dot warn"></span>';
    }

    function clusterStatusDot(status) {
      // Couleur du point basée sur le statut réel du cluster ES
      // (green/yellow/red), pas juste up/down — un cluster "yellow"
      // est up mais dégradé, ça doit se voir.
      if (status === 'green')  return '<span class="dot up"></span>';
      if (status === 'yellow') return '<span class="dot warn"></span>';
      if (status === 'red')    return '<span class="dot down"></span>';
      return '<span class="dot warn"></span>';
    }

    // ── Rendu de l'état des composants ─────────────────────────
    async function renderStatus() {
      const s = await api('/admin/status');
      const tika = s.tika || {};
      const workers = s.workers || {};
      const watcher = s.watcher || {};

      const body = `
          <div class="status-grid">
            <div class="status-card">
              <div class="name">Elasticsearch</div>
              <div class="value">${s.elasticsearch?.up ? clusterStatusDot(s.elasticsearch.status) : statusDot(false)}${s.elasticsearch?.status || (s.elasticsearch?.up ? 'up' : 'down')}</div>
            </div>
            <div class="status-card">
              <div class="name">Redis</div>
              <div class="value">${statusDot(s.redis?.up)}${s.redis?.up ? 'up' : 'down'}</div>
            </div>
            <div class="status-card">
              <div class="name">Kafka</div>
              <div class="value">${statusDot(s.kafka?.up)}${s.kafka?.up ? 'up' : 'down'}</div>
            </div>
            <div class="status-card">
              <div class="name">Tika</div>
              <div class="value">${statusDot(tika.up_count > 0)}${tika.up_count ?? '?'}/${tika.total ?? '?'} instances</div>
            </div>
            <div class="status-card">
              <div class="name">Workers actifs</div>
              <div class="value">${statusDot(workers.active_workers > 0)}${workers.active_workers ?? '?'}</div>
            </div>
            <div class="status-card">
              <div class="name">Watcher</div>
              <div class="value">${statusDot(watcher.alive)}${watcher.alive ? 'actif' : 'silencieux'}</div>
              <div class="muted">${watcher.last_seen_seconds_ago != null ? `vu il y a ${watcher.last_seen_seconds_ago}s` : ''}</div>
            </div>
            <div class="status-card">
              <div class="name">File d'indexation</div>
              <div class="value">${workers.pending_documents ?? '?'}</div>
              <div class="muted">document(s) en attente de traitement</div>
            </div>
          </div>`;
      return panelWrap('status-panel', 'État des composants', 'rafraîchi toutes les 5s', body);
    }

    // ── Types de fichiers ───────────────────────────────────────
    async function renderFiletypes() {
      if (!sourcesCache[selectedFiletypeSource]) selectedFiletypeSource = 'documents';
      const cfg = await api(`/admin/filetypes?source=${encodeURIComponent(selectedFiletypeSource)}`);
      const rows = Object.entries(cfg).map(([ext, rule]) => `
        <tr data-ext="${ext}">
          <td>${ext}</td>
          <td><input type="checkbox" class="ft-enabled" ${rule.enabled ? 'checked' : ''} /></td>
          <td><input type="number" class="ft-size" value="${rule.max_size_mb ?? ''}" min="0" step="1" /></td>
          <td><button class="secondary ft-save">Enregistrer</button><span class="save-hint">✓ enregistré</span></td>
          <td>${ext === 'default' ? '' : '<button class="danger ft-delete">Supprimer</button>'}</td>
        </tr>`).join('');

      const body = `
          <div class="row">
            <label class="muted" for="filetype-source">Source :</label>
            <select id="filetype-source">${sourceOptions(selectedFiletypeSource)}</select>
          </div>
          <table>
            <thead><tr><th>Extension</th><th>Activé</th><th>Taille max (Mo)</th><th></th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <input type="text" id="new-ext" placeholder="nouvelle extension (ex: jpg)" />
            <input type="number" id="new-ext-size" placeholder="Mo" style="max-width:90px;" />
            <button id="add-ext">Ajouter</button>
            <button id="reset-filetypes" class="secondary">Charger les extensions par défaut</button>
          </div>`;
      return panelWrap('filetypes-panel', 'Types de fichiers', 'par source — chaque source a sa propre configuration', body);
    }

    function wireFiletypes() {
      document.getElementById('filetype-source')?.addEventListener('change', async (e) => {
        selectedFiletypeSource = e.target.value;
        await refresh();
      });
      document.querySelectorAll('.ft-save').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const ext = tr.dataset.ext;
          const enabled = tr.querySelector('.ft-enabled').checked;
          const max_size_mb = parseFloat(tr.querySelector('.ft-size').value) || null;
          await api(`/admin/filetypes/${ext}`, { method: 'POST', body: JSON.stringify({ enabled, max_size_mb, source: selectedFiletypeSource }) });
          const hint = e.target.nextElementSibling;
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1500);
        });
      });
      document.querySelectorAll('.ft-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const ext = tr.dataset.ext;
          if (!confirm(`Supprimer l'extension .${ext} (source '${selectedFiletypeSource}') ? Elle ne sera plus indexée pour cette source.`)) return;
          await api(`/admin/filetypes/${ext}?source=${encodeURIComponent(selectedFiletypeSource)}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-ext')?.addEventListener('click', async () => {
        const ext = document.getElementById('new-ext').value.trim().replace(/^\./, '');
        const size = parseFloat(document.getElementById('new-ext-size').value) || null;
        if (!ext) return;
        await api(`/admin/filetypes/${ext}`, { method: 'POST', body: JSON.stringify({ enabled: true, max_size_mb: size, source: selectedFiletypeSource }) });
        await refresh();
      });
      document.getElementById('reset-filetypes')?.addEventListener('click', async () => {
        if (!confirm(`Charger les extensions par défaut pour la source '${selectedFiletypeSource}' ? Toute extension ajoutée et tout réglage personnalisé (activation, taille max) seront écrasés pour cette source.`)) return;
        await api(`/admin/filetypes/reset?source=${encodeURIComponent(selectedFiletypeSource)}`, { method: 'POST' });
        await refresh();
      });
    }

    // ── Paramètres opérationnels ────────────────────────────────
    async function renderConfig() {
      const cfg = await api('/admin/config');
      const rows = Object.entries(cfg).map(([key, value]) => `
        <tr data-key="${key}">
          <td>${key}</td>
          <td><input type="number" class="cfg-value" value="${value}" /></td>
          <td><button class="secondary cfg-save">Enregistrer</button><span class="save-hint">✓ enregistré</span></td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Paramètre</th><th>Valeur</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <button id="reset-config" class="secondary">Charger les paramètres par défaut</button>
          </div>`;
      return panelWrap('config-panel', 'Paramètres opérationnels', 'effectifs sous ~10s, sans redémarrage', body);
    }

    function wireConfig() {
      document.querySelectorAll('.cfg-save').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const key = tr.dataset.key;
          const value = tr.querySelector('.cfg-value').value;
          await api(`/admin/config/${key}`, { method: 'POST', body: JSON.stringify({ value }) });
          const hint = e.target.nextElementSibling;
          hint.classList.add('show');
          setTimeout(() => hint.classList.remove('show'), 1500);
        });
      });
      document.getElementById('reset-config')?.addEventListener('click', async () => {
        if (!confirm("Charger les paramètres par défaut ? Tout réglage personnalisé sera écrasé.")) return;
        await api('/admin/config/reset', { method: 'POST' });
        await refresh();
      });
    }

    // ── Mesure de satisfaction (pouce + NPS) ─────────────────────
    // Le tracking de clic n'a pas de bascule ici : signal passif,
    // toujours actif (voir docsearch-api/search_api.py).
    async function renderEngagement() {
      const cfg = await api('/engagement-config');
      const body = `
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="eng-feedback" ${cfg.feedback_enabled ? 'checked' : ''} />
              Pouce haut/bas après chaque recherche
            </label>
          </div>
          <div class="row">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="eng-nps" ${cfg.nps_enabled ? 'checked' : ''} />
              Popup NPS occasionnelle (toutes les 20 recherches, cooldown 30 jours)
            </label>
          </div>
          <p class="muted" style="margin-top:8px;">
            Le tracking de clic sur les résultats reste toujours actif — c'est un signal passif,
            sans widget ni friction pour l'utilisateur, pas de bascule nécessaire.
          </p>`;
      return panelWrap('engagement-panel', 'Mesure de satisfaction', "effectif immédiatement, pas de redémarrage", body);
    }

    function wireEngagement() {
      document.getElementById('eng-feedback')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {
          await api('/admin/engagement-config', { method: 'POST', body: JSON.stringify({ feedback_enabled: checked }) });
        } catch (err) {
          e.target.checked = !checked;
          alert(`Erreur : ${err.message}`);
        }
      });
      document.getElementById('eng-nps')?.addEventListener('change', async (e) => {
        const checked = e.target.checked;
        try {
          await api('/admin/engagement-config', { method: 'POST', body: JSON.stringify({ nps_enabled: checked }) });
        } catch (err) {
          e.target.checked = !checked;
          alert(`Erreur : ${err.message}`);
        }
      });
    }

    // ── Toutes les sources (vue unifiée fichier/SQL/web) ─────────
    // Complète les panneaux CRUD dédiés (Sources / Sources SQL / Sources
    // web ci-dessous, qui gèrent chacun les champs propres à leur type)
    // par une liste transverse : compte de documents + bascule
    // "recherche activée" par source, quel que soit son type. Désactiver
    // la recherche n'arrête PAS l'ingestion (watcher/sql-worker/
    // web-worker continuent normalement) — la source devient seulement
    // invisible dans /search.
    const TYPE_LABELS = { file: 'Bureautique', sql: 'SQL', web: 'Web' };

    async function renderAllSources() {
      const sources = await api('/admin/all-sources');
      const rows = Object.entries(sources)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([name, s]) => `
        <tr data-name="${name}" data-type="${s.type}">
          <td>${escapeHtml(s.label)}</td>
          <td>${TYPE_LABELS[s.type] || s.type}</td>
          <td class="muted">${s.es_index}</td>
          <td style="text-align:right;">${(s.indexed ?? 0).toLocaleString('fr-FR')}</td>
          <td style="text-align:right;">${formatBytes(s.size_bytes)}</td>
          <td>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" class="src-searchable" ${s.searchable ? 'checked' : ''} />
              <span class="muted">${s.searchable ? 'activée' : 'désactivée'}</span>
            </label>
          </td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Source</th><th>Type</th><th>Index ES</th><th style="text-align:right;">Documents</th><th style="text-align:right;">Taille</th><th>Recherche</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="6" class="muted">Aucune source enregistrée.</td></tr>'}</tbody>
          </table>`;
      return panelWrap('allsources-panel', 'Toutes les sources', 'documents bureautiques, web et SQL confondus', body);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 o';
      const units = ['o', 'Ko', 'Mo', 'Go', 'To'];
      let i = 0;
      let value = bytes;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return `${value.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
    }

    // Renommage générique, partagé par les panneaux Sources / Sources SQL /
    // Sources web — le endpoint (différent par type) répercute aussi le
    // champ "source" des documents déjà indexés (voir _rename_source_documents
    // côté docsearch-api), pas seulement le registre.
    async function renameSourcePrompt(oldName, endpointBase) {
      const newName = prompt(`Nouveau nom pour la source '${oldName}' (minuscules, chiffres, '-'/'_') :`, oldName);
      if (!newName || newName.trim() === '' || newName === oldName) return false;
      try {
        const res = await api(`${endpointBase}/${encodeURIComponent(oldName)}/rename`, {
          method: 'POST',
          body: JSON.stringify({ new_name: newName.trim() }),
        });
        if (res.documents_updated) {
          alert(`Source renommée en '${newName.trim()}' — ${res.documents_updated} document(s) mis à jour.`);
        }
        return true;
      } catch (e) {
        alert(`Erreur : ${e.message}`);
        return false;
      }
    }

    function wireAllSources() {
      document.querySelectorAll('.src-searchable').forEach(cb => {
        cb.addEventListener('change', async (e) => {
          const tr = e.target.closest('tr');
          const name = tr.dataset.name;
          const type = tr.dataset.type;
          const searchable = e.target.checked;
          const label = e.target.nextElementSibling;
          e.target.disabled = true;
          try {
            await api(`/admin/all-sources/${encodeURIComponent(name)}/searchable?type=${type}`, {
              method: 'POST', body: JSON.stringify({ searchable }),
            });
            label.textContent = searchable ? 'activée' : 'désactivée';
          } catch (err) {
            e.target.checked = !searchable;
            alert(`Erreur : ${err.message}`);
          } finally {
            e.target.disabled = false;
          }
        });
      });
    }

    // ── Sources d'indexation ─────────────────────────────────────
    // État partagé entre les panneaux qui doivent cibler UNE source
    // (filtres de chemin, scan) — persiste le choix de l'utilisateur
    // d'un rafraîchissement à l'autre plutôt que de revenir à
    // "documents" à chaque fois.
    let sourcesCache = { documents: { es_index: 'documents', folder: '', label: 'Documents' } };
    let selectedFilterSource = 'documents';
    let selectedScanSource = 'documents';
    let selectedFiletypeSource = 'documents';

    function sourceOptions(selected) {
      return Object.entries(sourcesCache).map(([name, s]) =>
        `<option value="${name}" ${name === selected ? 'selected' : ''}>${s.label || name} (${s.es_index})</option>`
      ).join('');
    }

    async function renderSources() {
      sourcesCache = await api('/admin/sources');
      const rows = Object.entries(sourcesCache).map(([name, s]) => `
        <tr data-name="${name}">
          <td>${name}</td>
          <td>${s.es_index}</td>
          <td class="muted">${s.folder}</td>
          <td>${name === 'documents' ? '' : '<button class="secondary src-rename">Renommer</button>'}</td>
          <td>${name === 'documents' ? '' : '<button class="danger src-delete">Retirer</button>'}</td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Nom</th><th>Index ES</th><th>Dossier (sous SOURCES_MOUNT)</th><th></th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="row" style="margin-top:14px;">
            <input type="text" id="new-src-name" placeholder="nom (ex: finance)" />
            <input type="text" id="new-src-index" placeholder="index ES (ex: finance_docs)" />
            <input type="text" id="new-src-subfolder" placeholder="sous-dossier (défaut : = nom)" />
            <input type="text" id="new-src-label" placeholder="libellé (optionnel)" />
            <button id="add-source">Ajouter</button>
          </div>
          <p class="muted" style="margin-top:8px;">
            Créez d'abord le sous-dossier sur l'hôte (SOURCES_ROOT/&lt;nom&gt;), puis enregistrez-le
            ici — le watcher commence à l'observer sous ~5s, sans redémarrage. Lancez ensuite
            l'indexation initiale avec le panneau "Indexation" ci-dessous.
          </p>`;
      return panelWrap('sources-panel', 'Sources', 'un répertoire indexé = un index Elasticsearch dédié', body);
    }

    function wireSources() {
      document.querySelectorAll('.src-rename').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (await renameSourcePrompt(name, '/admin/sources')) await refresh();
        });
      });
      document.querySelectorAll('.src-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer la source '${name}' ? Son index Elasticsearch et ses documents ne seront PAS supprimés.`)) return;
          await api(`/admin/sources/${name}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-source')?.addEventListener('click', async () => {
        const name = document.getElementById('new-src-name').value.trim();
        const es_index = document.getElementById('new-src-index').value.trim();
        const subfolder = document.getElementById('new-src-subfolder').value.trim() || null;
        const label = document.getElementById('new-src-label').value.trim() || null;
        if (!name || !es_index) { alert('Nom et index ES sont requis.'); return; }
        await api('/admin/sources', { method: 'POST', body: JSON.stringify({ name, es_index, subfolder, label }) });
        await refresh();
      });
    }

    // ── Sources SQL ──────────────────────────────────────────────
    // Résultat d'une requête PostgreSQL/MySQL indexé dans son propre
    // index ES (voir docsearch-ingestion/app/sql_indexer.py). Le mapping
    // colonnes -> champs ES ("fields") est saisi en JSON brut plutôt
    // qu'un formulaire dédié par colonne — c'est le même format que
    // celui déjà utilisé par ./manage.sh add-sql-source, pas une
    // nouvelle convention à apprendre. Contrairement aux sources
    // fichiers, il n'y a pas de bouton "lancer maintenant" ici : le
    // passage effectif reste au sql-worker déjà actif (poll automatique
    // à son propre intervalle), l'admin ne gère que le registre — l'API
    // ne résout jamais le DSN et ne se connecte jamais à une base SQL.
    async function renderSqlSources() {
      const sources = await api('/admin/sql-sources');
      const rows = Object.entries(sources).map(([name, s]) => `
        <tr data-name="${name}">
          <td>${name}</td>
          <td>${s.db_type}</td>
          <td>${s.es_index}</td>
          <td>${s.id_column}</td>
          <td class="muted">${s.connection_ref}</td>
          <td style="text-align:right;">${s.poll_interval_seconds}s</td>
          <td><button class="secondary sql-src-rename">Renommer</button></td>
          <td><button class="danger sql-src-delete">Retirer</button></td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Nom</th><th>Type</th><th>Index ES</th><th>Col. ID</th><th>connection_ref</th><th>Intervalle</th><th></th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="8" class="muted">Aucune source SQL.</td></tr>'}</tbody>
          </table>
          <div style="margin-top:14px;">
            <div class="row">
              <input type="text" id="new-sql-name" placeholder="nom (ex: clients_pg)" />
              <select id="new-sql-dbtype">
                <option value="postgresql">postgresql</option>
                <option value="mysql">mysql</option>
              </select>
              <input type="text" id="new-sql-connref" placeholder="connection_ref (ex: CLIENTS_PG_DSN)" />
            </div>
            <div class="row">
              <input type="text" id="new-sql-index" placeholder="index ES (ex: clients_pg_sql)" />
              <input type="text" id="new-sql-idcol" placeholder="colonne ID (ex: id)" />
              <input type="number" id="new-sql-interval" placeholder="intervalle (s)" value="300" min="10" style="max-width:130px;" />
            </div>
            <div class="row">
              <textarea id="new-sql-query" rows="2" style="flex:1;font:inherit;padding:6px 8px;border:1px solid #d5d5ce;border-radius:6px;"
                        placeholder="SELECT id, nom, email FROM clients WHERE actif = true"></textarea>
            </div>
            <div class="row">
              <textarea id="new-sql-fields" rows="4" style="flex:1;font:12px/1.4 monospace;padding:6px 8px;border:1px solid #d5d5ce;border-radius:6px;"
                        placeholder='[{"column":"id","es_field":"id","es_type":"keyword"},{"column":"nom","es_field":"nom","es_type":"text","analyzer":"french"},{"column":"email","es_field":"email","es_type":"keyword"}]'></textarea>
            </div>
            <button id="add-sql-source">Ajouter</button>
          </div>
          <p class="muted" style="margin-top:8px;">
            <code>connection_ref</code> est le NOM d'une variable d'environnement contenant le DSN complet
            (définie dans le .env de docsearch-infra) — jamais le DSN lui-même, qui ne transite ni par ici
            ni par Redis. Types ES possibles pour le mapping : keyword, text, long, double, date, boolean.
          </p>`;
      return panelWrap('sqlsources-panel', 'Sources SQL', 'requêtes PostgreSQL/MySQL indexées, réconciliées à chaque passage', body);
    }

    function wireSqlSources() {
      document.querySelectorAll('.sql-src-rename').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (await renameSourcePrompt(name, '/admin/sql-sources')) await refresh();
        });
      });
      document.querySelectorAll('.sql-src-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer la source SQL '${name}' ? Son index Elasticsearch et ses documents ne seront PAS supprimés.`)) return;
          await api(`/admin/sql-sources/${name}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-sql-source')?.addEventListener('click', async () => {
        const name           = document.getElementById('new-sql-name').value.trim();
        const db_type         = document.getElementById('new-sql-dbtype').value;
        const connection_ref  = document.getElementById('new-sql-connref').value.trim();
        const es_index        = document.getElementById('new-sql-index').value.trim();
        const id_column        = document.getElementById('new-sql-idcol').value.trim();
        const poll_interval_seconds = parseInt(document.getElementById('new-sql-interval').value, 10) || 300;
        const query           = document.getElementById('new-sql-query').value.trim();
        const fieldsRaw        = document.getElementById('new-sql-fields').value.trim();

        if (!name || !connection_ref || !es_index || !id_column || !query || !fieldsRaw) {
          alert('Tous les champs sont requis (nom, connection_ref, index ES, colonne ID, requête, mapping fields).');
          return;
        }
        let fields;
        try {
          fields = JSON.parse(fieldsRaw);
        } catch (e) {
          alert(`JSON invalide dans le mapping "fields" : ${e.message}`);
          return;
        }
        try {
          await api('/admin/sql-sources', {
            method: 'POST',
            body: JSON.stringify({ name, db_type, connection_ref, query, id_column, es_index, fields, poll_interval_seconds }),
          });
          await refresh();
        } catch (e) {
          alert(`Erreur : ${e.message}`);
        }
      });
    }

    // ── Sources web (Elastic Open Web Crawler) ──────────────────
    // Un site crawlé par Elastic Open Web Crawler écrit dans un index ES
    // intermédiaire (crawl_index, son propre schéma) — web_indexer.py
    // (docsearch-ingestion) le relit à intervalle régulier pour le
    // transformer vers le schéma DocSearch dans es_index. Comme pour les
    // sources SQL, il n'y a pas de bouton "lancer maintenant" ni de
    // configuration du crawl lui-même ici : ce panneau ne gère que le
    // registre crawl_index -> es_index (le crawl est configuré à part,
    // voir docsearch-infra/crawlers/*.yml, et tourne selon son propre
    // planning). web-worker (déjà actif) prend en compte la nouvelle
    // source sous ~5s, sans redémarrage.
    async function renderWebSources() {
      const sources = await api('/admin/web-sources');
      const rows = Object.entries(sources).map(([name, s]) => `
        <tr data-name="${name}">
          <td>${name}</td>
          <td class="muted">${s.crawl_index}</td>
          <td>${s.es_index}</td>
          <td>${s.acl_public ? 'public' : 'privé'}</td>
          <td style="text-align:right;">${s.poll_interval_seconds}s</td>
          <td>${s.paused
            ? '<span class="muted">⏸ suspendu</span>'
            : '<span style="color:#1f9254;">▶ actif</span>'}</td>
          <td><button class="secondary web-src-toggle-pause">${s.paused ? 'Reprendre' : 'Suspendre'}</button></td>
          <td><button class="secondary web-src-rename">Renommer</button></td>
          <td><button class="danger web-src-delete">Retirer</button></td>
        </tr>`).join('');

      const body = `
          <table>
            <thead><tr><th>Nom</th><th>Index de crawl</th><th>Index ES final</th><th>ACL</th><th>Intervalle</th><th>Crawl</th><th></th><th></th><th></th></tr></thead>
            <tbody>${rows || '<tr><td colspan="9" class="muted">Aucune source web.</td></tr>'}</tbody>
          </table>
          <p class="muted" style="margin-top:8px;">
            « Suspendre » arrête la RÉPERCUSSION vers DocSearch (web-worker cesse de relire l'index
            de crawl) — le conteneur Elastic Open Web Crawler lui-même, s'il tourne en planification
            continue, n'est pas piloté depuis cette interface et continue son cycle indépendamment.
          </p>
          <div style="margin-top:14px;">
            <div class="row">
              <input type="text" id="new-web-name" placeholder="nom (ex: cc_decisions)" />
              <input type="text" id="new-web-crawlindex" placeholder="index de crawl (output_index du crawler)" />
              <input type="text" id="new-web-esindex" placeholder="index ES final (ex: cc_decisions)" />
            </div>
            <div class="row">
              <label class="muted" for="new-web-public">Contenu public (sans authentification)</label>
              <input type="checkbox" id="new-web-public" checked style="flex:0;" />
              <input type="number" id="new-web-interval" placeholder="intervalle (s)" value="3600" min="30" style="max-width:130px;" />
            </div>
            <button id="add-web-source">Ajouter</button>
          </div>
          <p class="muted" style="margin-top:8px;">
            L'index de crawl doit correspondre au <code>output_index</code> déclaré dans la config
            Elastic Open Web Crawler du site (<code>docsearch-infra/crawlers/*.yml</code>) — jamais le
            même que l'index ES final, qui reçoit le contenu transformé au schéma DocSearch.
          </p>`;
      return panelWrap('websources-panel', 'Sources web', 'sites crawlés par Elastic Open Web Crawler', body);
    }

    function wireWebSources() {
      document.querySelectorAll('.web-src-toggle-pause').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const tr = e.target.closest('tr');
          const name = tr.dataset.name;
          const currentlyPaused = e.target.textContent.trim() === 'Reprendre';
          await api(`/admin/web-sources/${encodeURIComponent(name)}/pause`, {
            method: 'POST',
            body: JSON.stringify({ paused: !currentlyPaused }),
          });
          await refresh();
        });
      });
      document.querySelectorAll('.web-src-rename').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (await renameSourcePrompt(name, '/admin/web-sources')) await refresh();
        });
      });
      document.querySelectorAll('.web-src-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          const name = e.target.closest('tr').dataset.name;
          if (!confirm(`Retirer la source web '${name}' ? Ses index Elasticsearch et ses documents ne seront PAS supprimés.`)) return;
          await api(`/admin/web-sources/${name}`, { method: 'DELETE' });
          await refresh();
        });
      });
      document.getElementById('add-web-source')?.addEventListener('click', async () => {
        const name           = document.getElementById('new-web-name').value.trim();
        const crawl_index    = document.getElementById('new-web-crawlindex').value.trim();
        const es_index       = document.getElementById('new-web-esindex').value.trim();
        const acl_public     = document.getElementById('new-web-public').checked;
        const poll_interval_seconds = parseInt(document.getElementById('new-web-interval').value, 10) || 3600;

        if (!name || !crawl_index || !es_index) {
          alert('Nom, index de crawl et index ES final sont requis.');
          return;
        }
        try {
          await api('/admin/web-sources', {
            method: 'POST',
            body: JSON.stringify({ name, crawl_index, es_index, acl_public, poll_interval_seconds }),
          });
          await refresh();
        } catch (e) {
          alert(`Erreur : ${e.message}`);
        }
      });
    }

    // ── Filtres de chemin ───────────────────────────────────────
    async function renderPathFilters() {
      if (!sourcesCache[selectedFilterSource]) selectedFilterSource = 'documents';
      const cfg = await api(`/admin/path-filters?source=${encodeURIComponent(selectedFilterSource)}`);
      const tag = (p, kind) => `<span class="tag">${p}<button data-pattern="${p}" data-kind="${kind}" class="rm-filter">✕</button></span>`;
      const body = `
          <div class="row">
            <label class="muted" for="filter-source">Source :</label>
            <select id="filter-source">${sourceOptions(selectedFilterSource)}</select>
          </div>

          <div class="muted" style="margin-top:10px;">Liste noire (exclus)</div>
          <div class="tag-list" id="excluded-tags">${(cfg.excluded || []).map(p => tag(p, 'excluded')).join('') || '<span class="muted">aucune</span>'}</div>

          <div class="muted" style="margin-top:14px;">Liste blanche (si non vide, seuls ces chemins sont indexés)</div>
          <div class="tag-list" id="included-tags">${(cfg.included || []).map(p => tag(p, 'included')).join('') || '<span class="muted">aucune — tout est indexé sauf la liste noire</span>'}</div>

          <div class="row" style="margin-top:16px;">
            <input type="text" id="new-pattern" placeholder="ex: confidentiel ou */tmp" />
            <button id="add-exclude" class="secondary">Exclure</button>
            <button id="add-include" class="secondary">Inclure (liste blanche)</button>
          </div>

          <hr style="margin:16px 0;border:none;border-top:1px solid #eee;" />

          <div class="muted">Purger l'index existant selon un motif</div>
          <div class="row" style="margin-top:8px;">
            <input type="text" id="purge-pattern" placeholder="motif à purger" />
            <button id="purge-preview" class="secondary">Aperçu</button>
          </div>
          <div id="purge-result" class="muted"></div>`;
      return panelWrap('pathfilters-panel', 'Filtres de sous-dossiers', 'motifs glob, relatifs au dossier de la source', body);
    }

    function wirePathFilters() {
      document.getElementById('filter-source')?.addEventListener('change', async (e) => {
        selectedFilterSource = e.target.value;
        await refresh();
      });
      document.querySelectorAll('.rm-filter').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          await api('/admin/path-filters/remove', { method: 'POST', body: JSON.stringify({ pattern: e.target.dataset.pattern, source: selectedFilterSource }) });
          await refresh();
        });
      });
      document.getElementById('add-exclude')?.addEventListener('click', async () => {
        const pattern = document.getElementById('new-pattern').value.trim();
        if (!pattern) return;
        await api('/admin/path-filters/exclude', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource }) });
        await refresh();
      });
      document.getElementById('add-include')?.addEventListener('click', async () => {
        const pattern = document.getElementById('new-pattern').value.trim();
        if (!pattern) return;
        await api('/admin/path-filters/include', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource }) });
        await refresh();
      });

      let lastPreviewPattern = null;
      document.getElementById('purge-preview')?.addEventListener('click', async () => {
        const pattern = document.getElementById('purge-pattern').value.trim();
        if (!pattern) return;
        const resultEl = document.getElementById('purge-result');
        const res = await api('/admin/purge-path', { method: 'POST', body: JSON.stringify({ pattern, source: selectedFilterSource, dry_run: true }) });
        lastPreviewPattern = pattern;
        resultEl.innerHTML = `${res.matched} document(s) correspondent à '${pattern}' (source '${selectedFilterSource}'). ` +
          (res.matched > 0 ? `<button id="purge-confirm" class="danger" style="margin-left:8px;">Confirmer la suppression</button>` : '');
        document.getElementById('purge-confirm')?.addEventListener('click', async () => {
          if (!confirm(`Supprimer définitivement ${res.matched} document(s) de l'index (les fichiers sur le disque ne sont pas touchés) ?`)) return;
          const real = await api('/admin/purge-path', { method: 'POST', body: JSON.stringify({ pattern: lastPreviewPattern, source: selectedFilterSource, dry_run: false }) });
          resultEl.textContent = `${real.matched} document(s) supprimé(s) de l'index.`;
        });
      });
    }

    // ── Déclenchement d'un scan ─────────────────────────────────
    function renderScan() {
      if (!sourcesCache[selectedScanSource]) selectedScanSource = 'documents';
      const body = `
          <p class="muted">Publie les fichiers d'UNE source sur Kafka pour indexation par les workers actifs (pool partagé entre toutes les sources) — ne bloque pas, suivre la progression dans "État des composants" ci-dessus.</p>
          <div class="row" style="margin-top:12px;">
            <label class="muted" for="scan-source">Source :</label>
            <select id="scan-source">${sourceOptions(selectedScanSource)}</select>
            <input type="text" id="scan-subfolder" placeholder="sous-dossier (vide = dossier complet)" />
            <button id="scan-launch">Lancer un scan</button>
          </div>
          <div id="scan-result" class="muted"></div>`;
      return panelWrap('scan-panel', 'Indexation', null, body);
    }

    function wireScan() {
      document.getElementById('scan-source')?.addEventListener('change', (e) => {
        selectedScanSource = e.target.value;
      });
      document.getElementById('scan-launch')?.addEventListener('click', async () => {
        const subfolder = document.getElementById('scan-subfolder').value.trim() || null;
        const btn = document.getElementById('scan-launch');
        btn.disabled = true;
        try {
          const res = await api('/admin/scan', { method: 'POST', body: JSON.stringify({ source: selectedScanSource, subfolder }) });
          document.getElementById('scan-result').textContent =
            `Scan démarré (source '${res.source}', ${res.subfolder}). Suivre la progression dans "État des composants".`;
        } finally {
          btn.disabled = false;
        }
      });
    }

    // ── Orchestration ───────────────────────────────────────────
    async function refresh() {
      // Sources d'abord et à part (await, pas dans le lot ci-dessous) :
      // renderFiletypes()/renderPathFilters()/renderScan() lisent
      // sourcesCache de façon SYNCHRONE pour peupler leur <select> — il
      // doit déjà être à jour avant qu'ils s'exécutent, un
      // Promise.allSettled ne garantit pas cet ordre entre promesses
      // lancées en parallèle.
      let sourcesResult;
      try {
        sourcesResult = { status: 'fulfilled', value: await renderSources() };
      } catch (e) {
        sourcesResult = { status: 'rejected', reason: e };
      }

      const labels = ['Sources', 'État des composants', 'Types de fichiers',
                      'Paramètres opérationnels', 'Filtres de sous-dossiers', 'Sources SQL', 'Sources web',
                      'Toutes les sources', 'Mesure de satisfaction'];
      const results = [sourcesResult, ...await Promise.allSettled([
        renderStatus(), renderFiletypes(), renderConfig(), renderPathFilters(),
        renderSqlSources(), renderWebSources(), renderAllSources(), renderEngagement(),
      ])];

      // Un 401/403 sur N'IMPORTE laquelle de ces routes signifie que le
      // même contrôle d'accès a échoué pour toutes (appliqué
      // uniformément à /admin/*) — un seul bandeau plein écran est plus
      // clair que cinq messages "Accès refusé" redondants.
      const rejected    = results.filter(r => r.status === 'rejected').map(r => r.reason);
      const authFailure = rejected.find(e => e.status === 401 || e.status === 403);
      if (authFailure) {
        $app.innerHTML = `<div class="error-banner"><strong>Accès refusé.</strong> ${authFailure.message}</div>`;
        return;
      }

      // Sinon, chaque panneau affiche son propre message d'erreur à sa
      // place — un index ES absent (503) n'empêche pas les panneaux de
      // configuration (Redis, sans rapport) de s'afficher normalement.
      //
      // Ordre d'AFFICHAGE seulement (État des composants en premier,
      // visibilité immédiate de la santé du cluster) — distinct de
      // l'ordre d'EXÉCUTION ci-dessus, qui doit rester Sources en
      // premier pour peupler sourcesCache avant les panneaux qui le
      // lisent de façon synchrone. `results`/`labels` restent indexés
      // dans l'ordre d'exécution, seul displayOrder change.
      const displayOrder = [1, 7, 0, 2, 3, 8, 4, 5, 6];
      $app.innerHTML = displayOrder.map(i => {
        const r = results[i];
        return r.status === 'fulfilled'
          ? r.value
          : `<div class="panel"><h2>${labels[i]}</h2><div class="error-banner">${r.reason.message}</div></div>`;
      }).join('') + renderScan();

      wireSources();
      wireFiletypes();
      wireConfig();
      wirePathFilters();
      wireSqlSources();
      wireWebSources();
      wireAllSources();
      wireEngagement();
      wireScan();
    }

    async function refreshStatusOnly() {
      // Rafraîchissement léger périodique (état des composants
      // seulement) — pas les panneaux de configuration, qu'on ne veut
      // pas réécraser pendant que l'utilisateur les édite. Ciblage par
      // id (pas par position : '.panel' seul serait ambigu maintenant
      // que plusieurs panneaux read-only coexistent).
      const statusPanel = document.getElementById('status-panel');
      if (!statusPanel) return;

      try {
        statusPanel.outerHTML = await renderStatus();
      } catch (e) {
        // Échec transitoire (ES/Redis momentanément indisponible) : le
        // panneau garde son dernier état affiché plutôt que de casser.
      }
    }

    refresh();
    setInterval(refreshStatusOnly, 5000);
  </script>
</body>
</html>
