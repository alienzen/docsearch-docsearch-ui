<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DocSearch — Assistant IA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; height: 100vh;
           display: flex; flex-direction: column; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 12px 24px;
              display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 15px; font-weight: 600; color: #185FA5; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; max-width: 800px;
                margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 10px; font-size: 14px; }
    .bubble.ai   { background: #fff; border: 1px solid #e5e5e0; }
    .bubble.user { background: #185FA5; color: #fff; }
    .input-area { border-top: 1px solid #e5e5e0; background: #fff; padding: 16px 24px; }
    .input-row { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
    .input-row input { flex: 1; padding: 11px 14px; border-radius: 10px;
                       border: 1px solid #d5d5ce; font-size: 14px; }
    .send-btn { padding: 0 20px; border-radius: 10px; border: none;
                background: #185FA5; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">DocSearch — Assistant IA</span>
    <a href="/" style="font-size:13px;color:#555;">← Retour à la recherche</a>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <input id="q" placeholder="Posez votre question en français…"
             onkeydown="if(event.key==='Enter')send()" />
      <button class="send-btn" onclick="send()">Envoyer</button>
    </div>
  </div>

  <script>
    function addMsg(role, text) {
      const box = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : '');
      div.innerHTML = `<div class="bubble ${role}">${text}</div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    async function send() {
      const input = document.getElementById('q');
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      addMsg('user', q);
      addMsg('ai', '…');

      try {
        const res  = await fetch(`/ask?question=${encodeURIComponent(q)}`, { method: 'POST' });
        const data = await res.json();
        document.querySelectorAll('.bubble.ai').forEach(b => { if (b.textContent === '…') b.remove(); });
        addMsg('ai', data.answer || 'Pas de réponse.');
      } catch (e) {
        addMsg('ai', "Erreur : l'assistant IA (RAG) n'est pas encore déployé sur cet environnement.");
      }
    }

    addMsg('ai', 'Bonjour ! Posez-moi une question sur vos documents indexés.');
  </script>
</body>
</html>
