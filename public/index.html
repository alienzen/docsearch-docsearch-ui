<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DocSearch — Moteur de recherche documentaire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; }

    .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 24px;
              display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 16px; font-weight: 600; color: #185FA5; }
    .search-wrap { flex: 1; display: flex; gap: 8px; max-width: 700px; }
    /* Combinateur d'enfant direct (>) plutôt qu'un sélecteur descendant :
       .sources-select-panel (cases à cocher) est aussi niché dans
       .search-wrap, plusieurs niveaux plus profond — un sélecteur
       "input" générique les attrapait par erreur (flex:1, gros padding). */
    .search-wrap > input { flex: 1; padding: 8px 14px; border: 1px solid #d5d5ce;
                         border-radius: 8px; font-size: 15px; outline: none; }
    .search-wrap > input:focus { border-color: #185FA5; }
    .btn-primary { padding: 8px 18px; background: #185FA5; color: #fff; border: none;
                   border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-primary:hover { background: #0C447C; }
    .btn-reset { padding: 8px 14px; border-radius: 8px; border: 1px solid #d5d5ce;
                 background: #fff; color: #666; cursor: pointer; font-size: 13px; }
    .btn-reset:hover { background: #f5f5f3; color: #333; }
    .header-links { display: flex; gap: 16px; align-items: center; margin-left: auto; }
    .header-links a { font-size: 14px; text-decoration: none; }

    /* ── Présélection de sources (avant recherche) ────────────── */
    /* .sources-select-wrap est le flex item de .search-wrap (donc étiré
       en hauteur par align-items: stretch, comme l'étaient input/boutons)
       — display:flex dessus fait que le bouton À L'INTÉRIEUR suit cet
       étirement à son tour, plutôt que de garder sa hauteur naturelle et
       flotter mal aligné en haut de son enveloppe. */
    .sources-select-wrap { position: relative; display: flex; flex-shrink: 0; }
    .sources-select-toggle { padding: 8px 10px; border: 1px solid #d5d5ce; border-radius: 8px;
                              font-size: 13px; font-family: inherit; background: #fff; color: #555; cursor: pointer;
                              white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .sources-select-panel { display: none; position: absolute; top: 38px; left: 0; min-width: 220px;
                             max-height: 280px; overflow-y: auto; background: #fff; border: 1px solid #e5e5e0;
                             border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); padding: 8px; z-index: 50; }
    .sources-select-panel.open { display: block; }
    .sources-select-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
                            cursor: pointer; font-size: 13px; color: #333; }
    .sources-select-item:hover { background: #f5f5f3; }
    .sources-select-item input { flex-shrink: 0; }

    .saved-wrap { position: relative; }
    .saved-toggle { font-size: 14px; color: #185FA5; text-decoration: none; background: none;
                    border: none; cursor: pointer; font-family: inherit; }
    .saved-panel { display: none; position: absolute; top: 28px; right: 0; width: 320px;
                   max-height: 380px; overflow-y: auto; background: #fff; border: 1px solid #e5e5e0;
                   border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); padding: 8px; z-index: 50; }
    .saved-panel.open { display: block; }
    .saved-empty { font-size: 12px; color: #888; padding: 12px 10px; text-align: center; }
    .saved-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
                  cursor: pointer; }
    .saved-item:hover { background: #f5f5f3; }
    .saved-item-main { flex: 1; min-width: 0; }
    .saved-item-name { font-size: 13px; font-weight: 600; color: #1a1a18; white-space: nowrap;
                        overflow: hidden; text-overflow: ellipsis; }
    .saved-item-query { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden;
                         text-overflow: ellipsis; }
    .saved-item-criteria { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .saved-crit-tag { font-size: 10px; background: #f0f0ec; color: #666; padding: 2px 7px;
                       border-radius: 99px; white-space: nowrap; }
    .saved-item-delete { flex-shrink: 0; border: none; background: none; color: #aaa; cursor: pointer;
                          width: 22px; height: 22px; border-radius: 5px; display: inline-flex;
                          align-items: center; justify-content: center; font-size: 15px; line-height: 1; }
    .saved-item-delete:hover { background: #fff0f0; color: #c92a2a; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
    .active-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; min-height: 24px; }
    .active-filter-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
                          padding: 4px 6px 4px 12px; border-radius: 99px; background: #E6F1FB; color: #185FA5; }
    .active-filter-chip button { background: none; border: none; color: #185FA5; cursor: pointer;
                                 display: flex; padding: 2px; }

    .layout { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 24px; }
    @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

    .sidebar { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 16px;
               height: fit-content; position: sticky; top: 76px; }
    .facet-section { margin-bottom: 18px; }
    .facet-section:last-child { margin-bottom: 0; }
    .facet-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
                   color: #888; margin-bottom: 8px; }
    .facet-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 6px;
                 border-radius: 6px; cursor: pointer; font-size: 13px; color: #333; }
    .facet-row:hover { background: #f0f0ec; }
    .facet-row.active { background: #E6F1FB; color: #185FA5; font-weight: 500; }
    .facet-count { font-size: 11px; background: #f0f0ec; color: #888; padding: 1px 6px; border-radius: 99px; }
    .facet-row.active .facet-count { background: transparent; color: #185FA5; }
    .facet-empty { font-size: 12px; color: #aaa; padding: 4px 6px; }
    .date-range { display: flex; flex-direction: column; gap: 6px; }
    .date-range label { font-size: 11px; color: #aaa; }
    .date-range input { font-size: 12px; height: 30px; padding: 4px 8px; border: 1px solid #d5d5ce;
                        border-radius: 6px; width: 100%; }
    .clear-link { font-size: 11px; color: #185FA5; cursor: pointer; background: none; border: none;
                  padding: 0; margin-top: 4px; text-decoration: underline; }

    .stats-bar { display: flex; justify-content: space-between; align-items: center;
                 margin-bottom: 12px; font-size: 13px; color: #666; }
    .sort-select { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
    .sort-select select { border: 1px solid #d5d5ce; border-radius: 6px; padding: 4px 8px;
                          font-size: 13px; background: #fff; cursor: pointer; }

    .result-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 12px; padding: 16px;
                   margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .result-card:hover { border-color: #85B7EB; box-shadow: 0 2px 8px rgba(24,95,165,0.08); }
    .result-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 6px; }
    .ext-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
                justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .result-title { font-size: 15px; font-weight: 600; color: #185FA5; margin-bottom: 4px; }
    .result-meta { display: flex; gap: 14px; font-size: 12px; color: #888; flex-wrap: wrap; }
    .result-meta span { display: flex; align-items: center; gap: 4px; }
    .source-badge { display: flex; align-items: center; gap: 5px; }
    .source-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center;
                  justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .highlight { background: #FFF200; color: #1a1a18; padding: 0 3px; border-radius: 3px; font-weight: 600; }
    .snippet { font-size: 13px; color: #555; line-height: 1.65; margin-top: 8px;
               border-left: 3px solid #E6F1FB; padding-left: 12px; }
    .score-pill { font-size: 11px; color: #888; background: #f5f5f3; padding: 2px 8px;
                  border-radius: 99px; flex-shrink: 0; }
    .archive-badge { font-size: 11px; color: #B34000; background: #FFF3E0; padding: 2px 8px;
                     border-radius: 99px; display: inline-flex; align-items: center; gap: 4px; }
    .result-path { font-family: ui-monospace, monospace; font-size: 11px; color: #aaa; margin-top: 4px;
                   display: flex; align-items: center; gap: 4px; }
    .result-path .path-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                               flex: 1; min-width: 0; }
    .copy-icon-btn { flex-shrink: 0; border: none; background: none; color: #aaa; cursor: pointer;
                     width: 22px; height: 22px; padding: 0; border-radius: 5px; display: inline-flex;
                     align-items: center; justify-content: center; }
    .copy-icon-btn svg { width: 14px; height: 14px; }
    .copy-icon-btn:hover { background: #f0f0ec; color: #185FA5; }
    .copy-icon-btn.copied { color: #1f9254; }

    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 20px; }
    .page-btn { min-width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
                border-radius: 8px; border: 1px solid #e5e5e0; background: #fff; cursor: pointer;
                font-size: 13px; color: #333; }
    .page-btn:hover { background: #f0f0ec; }
    .page-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .empty { text-align: center; color: #888; padding: 60px 0; }
    .empty i { font-size: 32px; display: block; margin-bottom: 10px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,24,0.45); display: none;
                     align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-card { background: #fff; border-radius: 12px; max-width: 560px; width: 100%;
                  max-height: 85vh; overflow-y: auto; padding: 24px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none;
                   cursor: pointer; color: #888; font-size: 20px; line-height: 1; padding: 4px; }
    .modal-close:hover { color: #333; }
    .modal-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 13px;
                 border-bottom: 1px solid #f0f0ec; }
    .modal-row:last-child { border-bottom: none; }
    .modal-row .k { color: #888; display: flex; align-items: center; gap: 6px; }
    .modal-row .v { color: #1a1a18; text-align: right; }
    .modal-banner { background: #FFF3E0; color: #B34000; border-radius: 8px; padding: 10px 14px;
                    font-size: 12px; margin-bottom: 16px; display: flex; gap: 8px; align-items: flex-start; }
    .modal-acl { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .acl-tag { font-size: 12px; padding: 4px 10px; border-radius: 99px; background: #f5f5f3;
               color: #555; display: flex; align-items: center; gap: 5px; }
    .modal-preview-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
                         background: #185FA5; color: #fff; border-radius: 8px; text-decoration: none;
                         font-size: 13px; margin-top: 4px; }
    .modal-preview-btn:hover { background: #0C447C; }

    /* ── Pouce haut/bas (feedback par recherche) ─────────────── */
    .feedback-bar { display: flex; align-items: center; gap: 10px; justify-content: center;
                    margin-top: 18px; padding: 14px; background: #fff; border: 1px solid #e5e5e0;
                    border-radius: 10px; font-size: 13px; color: #666; }
    .feedback-btn { border: 1px solid #d5d5ce; background: #fff; border-radius: 8px; cursor: pointer;
                    font-size: 16px; padding: 5px 12px; line-height: 1; }
    .feedback-btn:hover:not(:disabled) { background: #f5f5f3; }
    .feedback-btn:disabled { cursor: default; opacity: 0.5; }

    /* ── NPS (popup occasionnelle) ────────────────────────────── */
    .nps-scale { display: flex; gap: 6px; margin: 16px 0; flex-wrap: wrap; justify-content: center; }
    .nps-score-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid #d5d5ce;
                     background: #fff; cursor: pointer; font-size: 13px; }
    .nps-score-btn:hover { background: #f0f0ec; }
    .nps-score-btn.chosen { background: #185FA5; color: #fff; border-color: #185FA5; }
    .nps-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; }
    .nps-thanks { text-align: center; color: #1f9254; padding: 20px 0; font-size: 14px; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">DocSearch</span>
    <div class="search-wrap">
      <input id="q" type="search" placeholder='Rechercher dans vos documents… ("entre guillemets" pour une recherche exacte)'
             onkeydown="if(event.key==='Enter')doSearch()" />
      <div class="sources-select-wrap">
        <button type="button" class="sources-select-toggle" id="sources-select-toggle"
                title="Restreindre la recherche à une ou plusieurs sources" onclick="toggleSourcesPanel()">Toutes les sources ▾</button>
        <div class="sources-select-panel" id="sources-select-panel"></div>
      </div>
      <button class="btn-primary" onclick="doSearch()">Rechercher</button>
      <button class="btn-reset" onclick="resetSearch()">Réinitialiser la recherche</button>
    </div>
    <div class="header-links">
      <div class="saved-wrap">
        <button class="saved-toggle" onclick="toggleSavedPanel()">★ Mes recherches</button>
        <div class="saved-panel" id="saved-panel"></div>
      </div>
      <button id="suggestion-link" class="saved-toggle" style="display:none;" onclick="openSuggestionModal()">💡 Suggérer une idée</button>
      <a href="/chat" style="color:#185FA5;">Assistant IA →</a>
      <a href="/admin.html" style="color:#888;">Administration</a>
    </div>
  </header>

  <div class="container">
    <div class="active-filters" id="active-filters"></div>

    <div class="layout">
      <aside class="sidebar">
        <div class="facet-section">
          <div class="facet-title">Type de fichier</div>
          <div id="facet-extensions"><div class="facet-empty">Lancez une recherche</div></div>
        </div>
        <div class="facet-section">
          <div class="facet-title">Période (modification)</div>
          <div class="date-range">
            <label for="date-from">Du</label>
            <input type="date" id="date-from" onchange="applyDateRange()" />
            <label for="date-to">Au</label>
            <input type="date" id="date-to" onchange="applyDateRange()" />
          </div>
        </div>
        <div class="facet-section">
          <div class="facet-title">Source</div>
          <div id="facet-sources"><div class="facet-empty">Lancez une recherche</div></div>
        </div>
        <div class="facet-section">
          <div class="facet-title">Auteur</div>
          <div id="facet-authors"><div class="facet-empty">Lancez une recherche</div></div>
        </div>
        <div class="facet-section">
          <div class="facet-title">Dossier</div>
          <div id="facet-folders"><div class="facet-empty">Lancez une recherche</div></div>
        </div>
        <button class="clear-link" id="clear-all" style="display:none;" onclick="clearAllFilters()">
          Effacer tous les filtres
        </button>
      </aside>

      <main>
        <div class="stats-bar">
          <span id="result-count">Entrez une recherche</span>
          <div style="display:flex; align-items:center; gap:16px;">
            <button class="clear-link" style="margin-top:0;" onclick="saveCurrentSearch()">★ Enregistrer cette recherche</button>
          <div class="sort-select">
            Trier par :
            <select id="sort" onchange="doSearch()">
              <option value="_score">Pertinence</option>
              <option value="date_modified">Date de modification</option>
              <option value="filename">Nom</option>
              <option value="size">Taille</option>
            </select>
          </div>
          </div>
        </div>
        <div id="results"><p class="empty">Lancez une recherche pour voir les résultats.</p></div>
        <div id="pagination" class="pagination"></div>
        <div id="feedback-bar"></div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-card" id="modal-card"></div>
  </div>

  <div class="modal-overlay" id="nps-overlay" onclick="if(event.target===this)closeNps()">
    <div class="modal-card" id="nps-card" style="max-width:420px;"></div>
  </div>

  <div class="modal-overlay" id="suggestion-overlay" onclick="if(event.target===this)closeSuggestionModal()">
    <div class="modal-card" id="suggestion-card" style="max-width:460px;"></div>
  </div>

  <script>
    const PER_PAGE = 10;
    // Un chip "Word"/"Excel"/"PowerPoint" doit couvrir à la fois le
    // format moderne et l'ancien format binaire 97-2003 — sinon
    // sélectionner "Word" exclurait silencieusement les .doc.
    const SEARCH_IN_LABELS = { title: 'Titre', author: 'Auteur', filepath: 'Chemin' };
    const SORT_LABELS     = { date_modified: 'Date de modification', filename: 'Nom', size: 'Taille' };

    const EXT_COLORS = {
      '.pdf':  { bg:'#FCEBEB', color:'#A32D2D' },
      '.docx': { bg:'#E6F1FB', color:'#0C447C' }, '.doc': { bg:'#E6F1FB', color:'#0C447C' },
      '.xlsx': { bg:'#EAF3DE', color:'#27500A' }, '.xls': { bg:'#EAF3DE', color:'#27500A' },
      '.pptx': { bg:'#EEEDFE', color:'#3C3489' }, '.ppt': { bg:'#EEEDFE', color:'#3C3489' },
      '.pst':  { bg:'#FAEEDA', color:'#633806' },
      '.txt':  { bg:'#F1EFE8', color:'#444441' },
    };

    // Les sources (sources_config.py côté API) sont un ensemble ouvert,
    // enregistré dynamiquement — pas de palette fixe possible comme
    // EXT_COLORS. On dérive une couleur stable par simple hachage du
    // nom : la même source garde toujours la même couleur d'une
    // recherche à l'autre, sans avoir besoin de connaître la liste des
    // sources à l'avance.
    const SOURCE_PALETTE = [
      { bg:'#E6F1FB', color:'#0C447C' },
      { bg:'#EAF3DE', color:'#27500A' },
      { bg:'#EEEDFE', color:'#3C3489' },
      { bg:'#FFF3E0', color:'#B34000' },
      { bg:'#FCEBEB', color:'#A32D2D' },
      { bg:'#FAEEDA', color:'#633806' },
      { bg:'#E0F7F5', color:'#0A6B62' },
      { bg:'#FDE8F3', color:'#8C1D6B' },
    ];

    function sourceColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
      return SOURCE_PALETTE[hash % SOURCE_PALETTE.length];
    }

    let state = {
      // ext/author/source : sélection cumulative (plusieurs valeurs à la
      // fois, combinées en OR côté ES), au même titre que les facettes
      // "Source" et "Auteur" — folder reste mono-sélection. ext stocke
      // directement les valeurs brutes du champ ES (".pdf", ".docx"...),
      // identiques aux clés retournées par facets.extensions.
      ext: [], author: [], folder: null, source: [], dateFrom: null, dateTo: null,
      sort: '_score', page: 1,
      // searchId/resultIds : rattachent le pouce et le tracking de clic
      // à LA recherche qui a produit les résultats actuellement affichés
      // (voir renderFeedbackBar() et openDetail()).
      searchId: null, resultIds: [],
    };

    // Lu une fois au chargement — dit si le pouce/le NPS/les suggestions
    // doivent être affichés (suspendables depuis l'admin, voir
    // /admin/engagement-config). Le tracking de clic n'a pas
    // d'équivalent ici : toujours actif.
    let engagementConfig = { feedback_enabled: false, nps_enabled: false, suggestions_enabled: false };
    async function loadEngagementConfig() {
      try {
        engagementConfig = await api('/engagement-config');
      } catch (e) {
        // Échec silencieux (API indisponible) : pouce/NPS/suggestions
        // restent simplement masqués, la recherche elle-même n'est pas affectée.
      }
      document.getElementById('suggestion-link').style.display = engagementConfig.suggestions_enabled ? '' : 'none';
    }

    function toggleArrayValue(arr, value) {
      return arr.includes(value) ? arr.filter(v => v !== value) : [...arr, value];
    }

    // ── Présélection de sources (avant recherche) ────────────────
    // Complète la facette "Source" de la sidebar (qui n'apparaît qu'APRÈS
    // une recherche, dérivée des résultats) — les deux partagent le même
    // state.source, donc une sélection faite ici reste reflétée là-bas
    // (et réciproquement) sans code de synchronisation supplémentaire.
    let allSources = [];   // [{name, label, type}], chargé une fois au démarrage

    async function loadSearchableSources() {
      try {
        allSources = await api('/searchable-sources');
      } catch (e) {
        // Échec silencieux (API indisponible) : la présélection reste
        // vide, la recherche fédérée sur toutes les sources continue de
        // fonctionner normalement.
      }
      updateSourcesButtonLabel();
    }

    function updateSourcesButtonLabel() {
      const btn = document.getElementById('sources-select-toggle');
      if (!btn) return;
      let label;
      if (!state.source.length) label = 'Toutes les sources';
      else if (state.source.length === 1) label = state.source[0];
      else label = `${state.source.length} sources`;
      btn.textContent = label + ' ▾';
    }

    function renderSourcesPanel() {
      const panel = document.getElementById('sources-select-panel');
      if (!allSources.length) {
        panel.innerHTML = '<div class="saved-empty">Aucune source disponible</div>';
        return;
      }
      panel.innerHTML = allSources.map(s => `
        <label class="sources-select-item">
          <input type="checkbox" data-source="${escapeHtml(s.name)}" ${state.source.includes(s.name) ? 'checked' : ''} />
          ${escapeHtml(s.label)}
        </label>`).join('');
      panel.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
          state.source = toggleArrayValue(state.source, cb.dataset.source);
          updateSourcesButtonLabel();
        });
      });
    }

    function toggleSourcesPanel() {
      const panel = document.getElementById('sources-select-panel');
      const opening = !panel.classList.contains('open');
      if (!opening) { panel.classList.remove('open'); return; }
      renderSourcesPanel();
      panel.classList.add('open');
    }

    // Icônes en SVG inline plutôt qu'une police d'icônes (aucune n'est
    // chargée dans ce projet — les classes "ti ti-*" utilisées ailleurs
    // ne rendent rien visuellement) : ces deux boutons n'ont que leur
    // icône comme contenu, sans texte de secours, donc ils doivent
    // fonctionner sans dépendance externe.
    const ICON_FOLDER = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5l2 3h9a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-13a1 1 0 0 1 1 -1"/></svg>';
    const ICON_COPY   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8v-3a1 1 0 0 0 -1 -1h-9a1 1 0 0 0 -1 1v9a1 1 0 0 0 1 1h3"/></svg>';
    const ICON_CHECK  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l10 -10"/></svg>';

    function fmtSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' o';
      if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' Ko';
      return (bytes / 1048576).toFixed(1) + ' Mo';
    }

    function extLabel(ext) {
      return (ext || '').replace('.', '').toUpperCase() || '—';
    }

    async function api(path, options = {}) {
      const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        const err = new Error(body.detail || `Erreur ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return res.json();
    }

    async function doSearch() {
      const q = document.getElementById('q').value.trim();
      if (!q) return;
      state.sort = document.getElementById('sort').value;

      const body = {
        query: q,
        size: PER_PAGE,
        from: (state.page - 1) * PER_PAGE,
        sort: state.sort,
        extension: state.ext.length ? state.ext : null,
        author: state.author,
        folder: state.folder,
        source: state.source,
        date_from: state.dateFrom,
        date_to: state.dateTo,
      };

      const box = document.getElementById('results');
      try {
        const data = await api('/search', { method: 'POST', body: JSON.stringify(body) });
        state.searchId   = data.search_id || null;
        state.resultIds  = data.results.map(r => r.id);
        renderResults(data, q);
        renderFacets(data.facets);
        renderActiveFilters();
        renderFeedbackBar();
        maybeShowNps();
      } catch (e) {
        box.innerHTML = `<p class="empty">Impossible de contacter l'API : ${e.message}</p>`;
      }
    }

    // ── Pouce haut/bas ───────────────────────────────────────────
    function renderFeedbackBar() {
      const wrap = document.getElementById('feedback-bar');
      if (!engagementConfig.feedback_enabled || !state.searchId) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = `
        <div class="feedback-bar">
          <span>Cette recherche vous a-t-elle été utile ?</span>
          <button class="feedback-btn" data-rating="up" aria-label="Oui">👍</button>
          <button class="feedback-btn" data-rating="down" aria-label="Non">👎</button>
        </div>`;
      wrap.querySelectorAll('.feedback-btn').forEach(btn => {
        btn.addEventListener('click', () => submitFeedback(btn.dataset.rating));
      });
    }

    async function submitFeedback(rating) {
      const wrap = document.getElementById('feedback-bar');
      const searchId = state.searchId;   // fige la valeur : une recherche suivante ne doit pas changer la cible
      wrap.querySelectorAll('.feedback-btn').forEach(b => b.disabled = true);
      try {
        await api('/feedback', { method: 'POST', body: JSON.stringify({ search_id: searchId, rating }) });
        wrap.innerHTML = '<div class="feedback-bar"><span>Merci pour votre retour !</span></div>';
      } catch (e) {
        wrap.querySelectorAll('.feedback-btn').forEach(b => b.disabled = false);
        alert("Impossible d'enregistrer votre avis : " + e.message);
      }
    }

    // ── Tracking de clic (toujours actif, pas de flag) ──────────
    function trackClick(docId) {
      if (!state.searchId) return;
      const position = state.resultIds.indexOf(docId);
      // Fire-and-forget : ne doit jamais retarder ni bloquer l'ouverture
      // du détail du document pour l'utilisateur.
      api('/click', {
        method: 'POST',
        body: JSON.stringify({ search_id: state.searchId, doc_id: docId, position }),
      }).catch(() => {});
    }

    // ── NPS (popup occasionnelle) ────────────────────────────────
    const NPS_EVERY_N_SEARCHES = 20;
    const NPS_COOLDOWN_MS = 30 * 24 * 60 * 60 * 1000;   // 30 jours

    function maybeShowNps() {
      if (!engagementConfig.nps_enabled) return;
      const count = parseInt(localStorage.getItem('docsearch-search-count') || '0', 10) + 1;
      localStorage.setItem('docsearch-search-count', String(count));
      if (count % NPS_EVERY_N_SEARCHES !== 0) return;

      const lastShown = parseInt(localStorage.getItem('docsearch-nps-last-shown') || '0', 10);
      if (Date.now() - lastShown < NPS_COOLDOWN_MS) return;

      showNpsModal();
    }

    function showNpsModal() {
      localStorage.setItem('docsearch-nps-last-shown', String(Date.now()));
      const card = document.getElementById('nps-card');
      const scores = Array.from({ length: 11 }, (_, i) => i);
      card.innerHTML = `
        <button class="modal-close" onclick="closeNps()" aria-label="Fermer">✕</button>
        <p style="font-weight:600;font-size:15px;margin-bottom:6px;">Une question rapide</p>
        <p style="font-size:13px;color:#666;">Sur une échelle de 0 à 10, recommanderiez-vous DocSearch à un collègue ?</p>
        <div class="nps-scale">${scores.map(s => `<button class="nps-score-btn" data-score="${s}">${s}</button>`).join('')}</div>
        <div class="nps-labels"><span>Pas du tout probable</span><span>Très probable</span></div>`;
      document.getElementById('nps-overlay').classList.add('open');
      card.querySelectorAll('.nps-score-btn').forEach(btn => {
        btn.addEventListener('click', () => submitNps(parseInt(btn.dataset.score, 10)));
      });
    }

    async function submitNps(score) {
      const card = document.getElementById('nps-card');
      try {
        await api('/nps', { method: 'POST', body: JSON.stringify({ score }) });
      } catch (e) {
        // Échec silencieux : ne pas transformer un simple remerciement en erreur visible.
      }
      card.innerHTML = '<div class="nps-thanks">Merci pour votre retour !</div>';
      setTimeout(closeNps, 1500);
    }

    function closeNps() {
      document.getElementById('nps-overlay').classList.remove('open');
    }

    // ── Suggestions libres ───────────────────────────────────────
    function openSuggestionModal() {
      const card = document.getElementById('suggestion-card');
      card.innerHTML = `
        <button class="modal-close" onclick="closeSuggestionModal()" aria-label="Fermer">✕</button>
        <p style="font-weight:600;font-size:15px;margin-bottom:6px;">💡 Suggérer une idée</p>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">Une amélioration à proposer, un bug à signaler ? Dites-nous tout — votre suggestion est envoyée de façon anonyme, aucune identité n'est enregistrée.</p>
        <select id="suggestion-category" style="width:100%;padding:8px;border:1px solid #d5d5ce;border-radius:8px;font-size:13px;margin-bottom:10px;">
          <option value="idea">Idée / amélioration</option>
          <option value="bug">Bug</option>
          <option value="other">Autre</option>
        </select>
        <textarea id="suggestion-text" rows="5" placeholder="Votre suggestion…"
                  style="width:100%;padding:10px;border:1px solid #d5d5ce;border-radius:8px;font:inherit;font-size:13px;resize:vertical;"></textarea>
        <button class="btn-primary" style="margin-top:12px;width:100%;" onclick="submitSuggestion()">Envoyer</button>`;
      document.getElementById('suggestion-overlay').classList.add('open');
      document.getElementById('suggestion-text').focus();
    }

    async function submitSuggestion() {
      const text = document.getElementById('suggestion-text').value.trim();
      if (!text) { alert('Le champ ne peut pas être vide.'); return; }
      const category = document.getElementById('suggestion-category').value;
      const card = document.getElementById('suggestion-card');
      try {
        await api('/suggestions', { method: 'POST', body: JSON.stringify({ text, category }) });
        card.innerHTML = '<div class="nps-thanks">Merci pour votre suggestion !</div>';
        setTimeout(closeSuggestionModal, 1500);
      } catch (e) {
        alert("Impossible d'envoyer votre suggestion : " + e.message);
      }
    }

    function closeSuggestionModal() {
      document.getElementById('suggestion-overlay').classList.remove('open');
    }

    function renderResults(data, q) {
      const box = document.getElementById('results');
      document.getElementById('result-count').textContent =
        data.total.toLocaleString('fr-FR') + ' résultat' + (data.total > 1 ? 's' : '') +
        (q ? ` pour « ${q} »` : '');

      if (!data.results.length) {
        box.innerHTML = '<p class="empty"><i class="ti ti-search-off" aria-hidden="true"></i>Aucun résultat ne correspond à ces critères.</p>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      box.innerHTML = data.results.map(r => {
        const ec = EXT_COLORS[r.extension] || { bg: '#F1EFE8', color: '#444441' };
        const snippets = (r.highlight || []).join(' … ');
        const scorePct = Math.min(100, Math.round((r.score || 0) * 20));
        const isArchiveMember = (r.filepath || '').includes('::');
        const archiveNote = isArchiveMember
          ? `<span class="archive-badge"><i class="ti ti-file-zip" aria-hidden="true" style="font-size:12px;"></i>Extrait d'une archive</span>`
          : '';
        const sourceNote = r.source
          ? (() => {
              const sc = sourceColor(r.source);
              return `<span class="source-badge" title="Source : ${escapeHtml(r.source)}">
                <span class="source-dot" style="background:${sc.bg};color:${sc.color};">${escapeHtml(r.source.charAt(0).toUpperCase())}</span>
                ${escapeHtml(r.source)}
              </span>`;
            })()
          : '';
        return `
        <div class="result-card" onclick="openDetail('${r.id}')">
          <div class="result-header">
            <div class="ext-icon" style="background:${ec.bg};color:${ec.color};">${extLabel(r.extension)}</div>
            <div style="flex:1;min-width:0;">
              <div class="result-title">${r.title || r.filename}</div>
              <div class="result-meta">
                ${sourceNote}
                ${r.author ? `<span><i class="ti ti-user" aria-hidden="true"></i>${r.author}</span>` : ''}
                <span><i class="ti ti-calendar" aria-hidden="true"></i>${r.date_modified ? r.date_modified.slice(0,10) : '—'}</span>
                ${r.folder ? `<span><i class="ti ti-folder" aria-hidden="true"></i>${r.folder}</span>` : ''}
                <span><i class="ti ti-file" aria-hidden="true"></i>${fmtSize(r.size)}</span>
                ${r.acl && r.acl.groups && r.acl.groups.length ? `<span><i class="ti ti-lock" aria-hidden="true"></i>${r.acl.groups[0]}</span>` : ''}
                ${archiveNote}
              </div>
              ${r.filepath ? `
                <div class="result-path" title="${escapeHtml(r.filepath)}">
                  <i class="ti ti-route" aria-hidden="true"></i>
                  <span class="path-text">${r.filepath}</span>
                  <button class="copy-icon-btn" data-path="${escapeHtml(r.filepath)}" data-copy="dir"
                          onclick="event.stopPropagation(); copyPathClick(event);"
                          title="Copier le chemin du dossier" aria-label="Copier le chemin du dossier">${ICON_FOLDER}</button>
                  <button class="copy-icon-btn" data-path="${escapeHtml(r.filepath)}" data-copy="full"
                          onclick="event.stopPropagation(); copyPathClick(event);"
                          title="Copier le chemin complet" aria-label="Copier le chemin complet">${ICON_COPY}</button>
                </div>` : ''}
            </div>
            <span class="score-pill">${scorePct}%</span>
          </div>
          ${snippets ? `<div class="snippet">${snippets}</div>` : ''}
        </div>`;
      }).join('');

      renderPagination(data.total);
    }

    function renderPagination(total) {
      const pages = Math.ceil(total / PER_PAGE);
      const pag = document.getElementById('pagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      const range = [];
      for (let i = Math.max(1, state.page - 2); i <= Math.min(pages, state.page + 2); i++) range.push(i);
      pag.innerHTML =
        (state.page > 1 ? `<div class="page-btn" onclick="goPage(${state.page - 1})">←</div>` : '') +
        range.map(i => `<div class="page-btn${i === state.page ? ' active' : ''}" onclick="goPage(${i})">${i}</div>`).join('') +
        (state.page < pages ? `<div class="page-btn" onclick="goPage(${state.page + 1})">→</div>` : '');
    }

    function goPage(n) { state.page = n; doSearch(); }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      // Repli pour les contextes non sécurisés (http:// hors localhost, ex:
      // accès direct par IP en dev) — l'API Clipboard moderne y est
      // indisponible, seul execCommand('copy') fonctionne encore.
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }

    function dirOfPath(filepath) {
      // Pour un membre d'archive ("archive.zip::inner/fichier.txt"), le
      // dossier réel sur le disque est celui de l'archive elle-même, pas
      // un chemin interne à l'archive.
      const outer = filepath.split('::')[0];
      const idx = Math.max(outer.lastIndexOf('/'), outer.lastIndexOf('\\'));
      return idx >= 0 ? outer.slice(0, idx) : outer;
    }

    async function copyPathClick(e) {
      const btn      = e.currentTarget;
      const filepath = btn.dataset.path;
      const text     = btn.dataset.copy === 'dir' ? dirOfPath(filepath) : filepath;
      try {
        await copyText(text);
        const original = btn.innerHTML;
        btn.innerHTML = ICON_CHECK;
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 1200);
      } catch (err) {
        alert("Impossible de copier dans le presse-papier : " + err.message);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderFacets(facets) {
      if (!facets) return;

      const extensionsBox = document.getElementById('facet-extensions');
      extensionsBox.innerHTML = (facets.extensions || []).filter(f => f.key).map(f => `
        <div class="facet-row${state.ext.includes(f.key) ? ' active' : ''}" data-facet-type="ext" data-facet-value="${escapeHtml(f.key)}">
          <span>${extLabel(f.key)}</span><span class="facet-count">${f.doc_count.toLocaleString('fr-FR')}</span>
        </div>`).join('') || '<div class="facet-empty">Aucun type</div>';

      const sourcesBox = document.getElementById('facet-sources');
      sourcesBox.innerHTML = (facets.sources || []).filter(f => f.key).map(f => `
        <div class="facet-row${state.source.includes(f.key) ? ' active' : ''}" data-facet-type="source" data-facet-value="${escapeHtml(f.key)}">
          <span>${f.key}</span><span class="facet-count">${f.doc_count.toLocaleString('fr-FR')}</span>
        </div>`).join('') || '<div class="facet-empty">Aucune source</div>';

      const authorsBox = document.getElementById('facet-authors');
      authorsBox.innerHTML = (facets.authors || []).filter(f => f.key).map(f => `
        <div class="facet-row${state.author.includes(f.key) ? ' active' : ''}" data-facet-type="author" data-facet-value="${escapeHtml(f.key)}">
          <span>${f.key}</span><span class="facet-count">${f.doc_count.toLocaleString('fr-FR')}</span>
        </div>`).join('') || '<div class="facet-empty">Aucun auteur</div>';

      const foldersBox = document.getElementById('facet-folders');
      foldersBox.innerHTML = (facets.folders || []).filter(f => f.key).map(f => `
        <div class="facet-row${state.folder === f.key ? ' active' : ''}" data-facet-type="folder" data-facet-value="${escapeHtml(f.key)}">
          <span>${f.key}</span><span class="facet-count">${f.doc_count.toLocaleString('fr-FR')}</span>
        </div>`).join('') || '<div class="facet-empty">Aucun dossier</div>';

      // Gestionnaires attachés après le rendu plutôt qu'un onclick
      // interpolé directement dans le HTML (l'ancienne version cassait
      // le HTML dès qu'un nom d'auteur/dossier contenait un guillemet,
      // via JSON.stringify() injecté dans un attribut déjà délimité
      // par des guillemets doubles).
      document.querySelectorAll('#facet-extensions .facet-row, #facet-sources .facet-row, #facet-authors .facet-row, #facet-folders .facet-row').forEach(row => {
        row.addEventListener('click', () => toggleFacet(row.dataset.facetType, row.dataset.facetValue));
      });
    }

    function toggleFacet(type, value) {
      if (type === 'ext') state.ext = toggleArrayValue(state.ext, value);
      if (type === 'source') state.source = toggleArrayValue(state.source, value);
      if (type === 'author') state.author = toggleArrayValue(state.author, value);
      if (type === 'folder') state.folder = (state.folder === value) ? null : value;
      state.page = 1;
      doSearch();
    }

    function applyDateRange() {
      state.dateFrom = document.getElementById('date-from').value || null;
      state.dateTo   = document.getElementById('date-to').value || null;
      state.page = 1;
      doSearch();
    }

    function renderActiveFilters() {
      const wrap = document.getElementById('active-filters');
      const chips = [];
      // Une puce PAR valeur sélectionnée (sélection cumulative) — la
      // retirer ne déselectionne que cette valeur-là, pas tout le facet.
      state.ext.forEach(e => chips.push({ label: 'Type : ' + extLabel(e), clear: () => { state.ext = state.ext.filter(v => v !== e); } }));
      state.source.forEach(s => chips.push({ label: 'Source : ' + s, clear: () => { state.source = state.source.filter(v => v !== s); } }));
      state.author.forEach(a => chips.push({ label: 'Auteur : ' + a, clear: () => { state.author = state.author.filter(v => v !== a); } }));
      if (state.folder) chips.push({ label: 'Dossier : ' + state.folder, clear: () => { state.folder = null; } });
      if (state.dateFrom || state.dateTo) chips.push({
        label: 'Période : ' + (state.dateFrom || '…') + ' → ' + (state.dateTo || '…'),
        clear: () => {
          state.dateFrom = null; state.dateTo = null;
          document.getElementById('date-from').value = '';
          document.getElementById('date-to').value = '';
        }
      });
      wrap.innerHTML = chips.map((c, i) =>
        `<span class="active-filter-chip">${c.label}<button onclick="clearFilterAt(${i})" aria-label="Retirer ce filtre"><i class="ti ti-x" aria-hidden="true" style="font-size:12px;"></i></button></span>`
      ).join('');
      window.__clearFns = chips.map(c => c.clear);
      document.getElementById('clear-all').style.display = chips.length ? 'inline-block' : 'none';
      updateSourcesButtonLabel();
    }

    function clearFilterAt(i) {
      window.__clearFns[i]();
      state.page = 1;
      doSearch();
    }

    function clearAllFilters() {
      state.ext = []; state.author = []; state.folder = null; state.source = []; state.dateFrom = null; state.dateTo = null; state.page = 1;
      document.getElementById('date-from').value = '';
      document.getElementById('date-to').value = '';
      doSearch();
    }

    function resetSearch() {
      // Remise à zéro complète — contrairement à clearAllFilters() (qui
      // ne touche qu'aux facettes/période), ceci efface aussi la requête
      // elle-même et le tri, et ramène l'affichage à l'état initial
      // (aucune recherche lancée).
      state = { ext: [], author: [], folder: null, source: [], dateFrom: null, dateTo: null, sort: '_score', page: 1, searchId: null, resultIds: [] };

      document.getElementById('q').value = '';
      document.getElementById('sort').value = '_score';
      document.getElementById('date-from').value = '';
      document.getElementById('date-to').value = '';

      document.getElementById('result-count').textContent = 'Entrez une recherche';
      document.getElementById('results').innerHTML = '<p class="empty">Lancez une recherche pour voir les résultats.</p>';
      document.getElementById('pagination').innerHTML = '';
      document.getElementById('feedback-bar').innerHTML = '';
      document.getElementById('active-filters').innerHTML = '';
      document.getElementById('facet-extensions').innerHTML = '<div class="facet-empty">Lancez une recherche</div>';
      document.getElementById('facet-sources').innerHTML = '<div class="facet-empty">Lancez une recherche</div>';
      document.getElementById('facet-authors').innerHTML = '<div class="facet-empty">Lancez une recherche</div>';
      document.getElementById('facet-folders').innerHTML = '<div class="facet-empty">Lancez une recherche</div>';
      document.getElementById('clear-all').style.display = 'none';
      updateSourcesButtonLabel();
    }

    // ── Recherches sauvegardées ─────────────────────────────────
    async function saveCurrentSearch() {
      const q = document.getElementById('q').value.trim();
      if (!q) { alert("Lancez une recherche avant de l'enregistrer."); return; }
      const name = prompt('Nom de cette recherche :', q);
      if (!name || !name.trim()) return;

      const body = {
        name,
        query:     q,
        ext:       state.ext,
        author:    state.author,
        folder:    state.folder,
        source:    state.source,
        date_from: state.dateFrom,
        date_to:   state.dateTo,
        sort:      state.sort,
      };
      try {
        await api('/saved-searches', { method: 'POST', body: JSON.stringify(body) });
      } catch (e) {
        alert("Impossible d'enregistrer la recherche : " + e.message);
      }
    }

    async function toggleSavedPanel() {
      const panel = document.getElementById('saved-panel');
      const opening = !panel.classList.contains('open');
      if (!opening) { panel.classList.remove('open'); return; }

      panel.classList.add('open');
      panel.innerHTML = '<div class="saved-empty">Chargement…</div>';
      try {
        const list = await api('/saved-searches');
        renderSavedPanel(list);
      } catch (e) {
        panel.innerHTML = `<div class="saved-empty">${e.message}</div>`;
      }
    }

    function multiLabel(v) {
      // author/source peuvent être une liste (nouveau, sélection
      // cumulative) ou une simple chaîne (anciennes recherches
      // enregistrées avant ce changement) — normalise les deux en texte
      // affichable, ou null si rien n'est sélectionné.
      if (Array.isArray(v)) return v.length ? v.join(', ') : null;
      return v || null;
    }

    function criteriaSummary(s) {
      const tags = [];
      // s.ext : liste (nouveau, sélection cumulative) ou chaîne unique/
      // 'all' (anciennes recherches enregistrées) — 'all' ou vide = pas
      // de filtre de type, rien à afficher.
      const extList = Array.isArray(s.ext) ? s.ext : (s.ext && s.ext !== 'all' ? [s.ext] : []);
      if (extList.length) tags.push(extList.map(e => extLabel(e)).join(', '));
      if (s.search_in && s.search_in !== 'all') tags.push('Champ : ' + (SEARCH_IN_LABELS[s.search_in] || s.search_in));
      const authorLabel = multiLabel(s.author);
      if (authorLabel) tags.push('Auteur : ' + authorLabel);
      if (s.folder) tags.push('Dossier : ' + s.folder);
      const sourceLabel = multiLabel(s.source);
      if (sourceLabel) tags.push('Source : ' + sourceLabel);
      if (s.date_from || s.date_to) tags.push('Période : ' + (s.date_from || '…') + ' → ' + (s.date_to || '…'));
      if (s.sort && s.sort !== '_score') tags.push('Tri : ' + (SORT_LABELS[s.sort] || s.sort));
      return tags;
    }

    function renderSavedPanel(list) {
      const panel = document.getElementById('saved-panel');
      if (!list.length) {
        panel.innerHTML = '<div class="saved-empty">Aucune recherche enregistrée.</div>';
        return;
      }
      panel.innerHTML = list.map(s => {
        const crit = criteriaSummary(s);
        return `
        <div class="saved-item" data-id="${s.id}">
          <div class="saved-item-main">
            <div class="saved-item-name">${escapeHtml(s.name)}</div>
            <div class="saved-item-query">« ${escapeHtml(s.query)} »</div>
            ${crit.length ? `<div class="saved-item-criteria">${crit.map(t => `<span class="saved-crit-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
          </div>
          <button class="saved-item-delete" title="Supprimer" aria-label="Supprimer">✕</button>
        </div>`;
      }).join('');

      panel.querySelectorAll('.saved-item').forEach(row => {
        const id = row.dataset.id;
        const entry = list.find(s => s.id === id);
        row.querySelector('.saved-item-main').addEventListener('click', () => applySavedSearch(entry));
        row.querySelector('.saved-item-delete').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm(`Supprimer la recherche « ${entry.name} » ?`)) return;
          try {
            const updated = await api(`/saved-searches/${id}`, { method: 'DELETE' });
            renderSavedPanel(updated);
          } catch (err) {
            alert('Impossible de supprimer : ' + err.message);
          }
        });
      });
    }

    function toArray(v) {
      // Normalise author/source vers un tableau, en acceptant aussi bien
      // le nouveau format (liste) que l'ancien (chaîne unique, recherches
      // enregistrées avant le passage à la sélection cumulative).
      if (Array.isArray(v)) return v;
      return v ? [v] : [];
    }

    function applySavedSearch(s) {
      // s.ext : liste (nouveau) ou chaîne unique/'all' (anciennes
      // recherches) — 'all' redevient un tableau vide (pas de filtre).
      const extList = Array.isArray(s.ext) ? s.ext : (s.ext && s.ext !== 'all' ? [s.ext] : []);
      state = {
        ext: extList, author: toArray(s.author), folder: s.folder || null,
        source: toArray(s.source),
        dateFrom: s.date_from || null, dateTo: s.date_to || null,
        sort: s.sort || '_score', page: 1,
      };

      document.getElementById('q').value = s.query;
      document.getElementById('sort').value = state.sort;
      document.getElementById('date-from').value = state.dateFrom || '';
      document.getElementById('date-to').value = state.dateTo || '';

      document.getElementById('saved-panel').classList.remove('open');
      doSearch();
    }

    document.addEventListener('click', (e) => {
      const wrap = document.querySelector('.saved-wrap');
      if (wrap && !wrap.contains(e.target)) {
        document.getElementById('saved-panel').classList.remove('open');
      }
      const sourcesWrap = document.querySelector('.sources-select-wrap');
      if (sourcesWrap && !sourcesWrap.contains(e.target)) {
        document.getElementById('sources-select-panel').classList.remove('open');
      }
    });

    async function openDetail(id) {
      trackClick(id);
      const overlay = document.getElementById('modal-overlay');
      const card = document.getElementById('modal-card');
      card.innerHTML = '<p style="text-align:center;color:#888;padding:40px 0;">Chargement…</p>';
      overlay.classList.add('open');

      try {
        const doc = await api('/document/' + id);
        renderDetail(doc, id);
      } catch (e) {
        card.innerHTML = `<button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
          <p style="color:#A32D2D;padding:20px 0;">Impossible de charger ce document : ${e.message}</p>`;
      }
    }

    function renderDetail(doc, id) {
      const card = document.getElementById('modal-card');
      const ec = EXT_COLORS[doc.extension] || { bg: '#F1EFE8', color: '#444441' };
      const isArchiveMember = (doc.filepath || '').includes('::');
      let archivePart = '', memberPart = '';
      if (isArchiveMember) {
        const parts = doc.filepath.split('::');
        archivePart = parts[0]; memberPart = parts[1];
      }

      const previewBanner = isArchiveMember
        ? `<div class="modal-banner"><i class="ti ti-info-circle" aria-hidden="true" style="margin-top:1px;"></i>
             Aperçu non disponible : ce document n'existe que temporairement pendant l'indexation de l'archive.</div>`
        : `<a class="modal-preview-btn" href="/api/preview/${id}" target="_blank">
             <i class="ti ti-eye" aria-hidden="true"></i> Voir l'aperçu</a>`;

      const aclGroups = (doc.acl && doc.acl.groups) || [];
      const aclGroupsHtml = aclGroups.map(g =>
        `<span class="acl-tag"><i class="ti ti-lock" aria-hidden="true"></i>Groupe : ${g}</span>`
      ).join('');

      card.innerHTML = `
        <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;">
          <div class="ext-icon" style="background:${ec.bg};color:${ec.color};width:44px;height:44px;font-size:11px;">${extLabel(doc.extension)}</div>
          <div style="flex:1;min-width:0;">
            <p style="font-weight:600;font-size:16px;">${doc.title || doc.filename}</p>
            ${isArchiveMember ? `<p style="font-size:12px;color:#888;margin-top:2px;">Extrait de l'archive ${archivePart.split('/').pop()}</p>` : ''}
          </div>
        </div>
        ${previewBanner}
        <div style="margin-top:16px;">
          <div class="modal-row"><span class="k"><i class="ti ti-user" aria-hidden="true"></i>Auteur</span><span class="v">${doc.author || '—'}</span></div>
          <div class="modal-row"><span class="k"><i class="ti ti-calendar-plus" aria-hidden="true"></i>Créé le</span><span class="v">${doc.date_created ? doc.date_created.slice(0,10) : '—'}</span></div>
          <div class="modal-row"><span class="k"><i class="ti ti-calendar" aria-hidden="true"></i>Modifié le</span><span class="v">${doc.date_modified ? doc.date_modified.slice(0,10) : '—'}</span></div>
          <div class="modal-row"><span class="k"><i class="ti ti-folder" aria-hidden="true"></i>Dossier</span><span class="v">${doc.folder || '—'}</span></div>
          <div class="modal-row"><span class="k"><i class="ti ti-file" aria-hidden="true"></i>Taille</span><span class="v">${fmtSize(doc.size)}</span></div>
          ${isArchiveMember ? `<div class="modal-row"><span class="k"><i class="ti ti-file-zip" aria-hidden="true"></i>Chemin dans l'archive</span><span class="v" style="font-family:monospace;font-size:12px;">${memberPart}</span></div>` : ''}
        </div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid #f0f0ec;">
          <p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#888;margin-bottom:8px;">Droits d'accès</p>
          <div class="modal-acl">
            ${doc.acl && doc.acl.owner ? `<span class="acl-tag"><i class="ti ti-user" aria-hidden="true"></i>Propriétaire : ${doc.acl.owner}</span>` : ''}
            ${aclGroupsHtml}
            ${doc.acl && doc.acl.public ? `<span class="acl-tag"><i class="ti ti-world" aria-hidden="true"></i>Public</span>` : ''}
          </div>
        </div>`;
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeNps(); closeSuggestionModal(); } });

    loadEngagementConfig();
    loadSearchableSources();
  </script>
</body>
</html>
