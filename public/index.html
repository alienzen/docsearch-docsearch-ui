<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DocSearch — Moteur de recherche documentaire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 24px;
              display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 16px; font-weight: 600; color: #185FA5; }
    .search-wrap { flex: 1; display: flex; gap: 8px; max-width: 700px; }
    .search-wrap input { flex: 1; padding: 8px 14px; border: 1px solid #d5d5ce;
                         border-radius: 8px; font-size: 15px; }
    .btn-primary { padding: 8px 18px; background: #185FA5; color: #fff; border: none;
                   border-radius: 8px; cursor: pointer; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    #results { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .result-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px;
                   padding: 16px; }
    .result-title { font-weight: 600; color: #185FA5; margin-bottom: 4px; }
    .result-meta { font-size: 12px; color: #888; }
    .empty { text-align: center; color: #888; padding: 40px 0; }
  </style>
</head>
<body>
  <header class="header">
    <span class="logo">DocSearch</span>
    <div class="search-wrap">
      <input id="q" type="search" placeholder="Rechercher dans vos documents…"
             onkeydown="if(event.key==='Enter')search()" />
      <button class="btn-primary" onclick="search()">Rechercher</button>
    </div>
    <a href="/chat" style="font-size:14px;color:#185FA5;">Assistant IA →</a>
  </header>

  <div class="container">
    <div id="results"><p class="empty">Lancez une recherche pour voir les résultats.</p></div>
  </div>

  <script>
    async function search() {
      const q = document.getElementById('q').value.trim();
      if (!q) return;
      const res  = await fetch('/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, size: 10 })
      });
      const data = await res.json();
      const box  = document.getElementById('results');
      if (!data.results || !data.results.length) {
        box.innerHTML = '<p class="empty">Aucun résultat.</p>';
        return;
      }
      box.innerHTML = data.results.map(r => `
        <div class="result-card">
          <div class="result-title">${r.title || r.filename}</div>
          <div class="result-meta">${r.filepath} — ${r.author || ''}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
