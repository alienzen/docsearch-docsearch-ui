worker_processes auto;
events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # L'API est résolue par le nom de service Docker "api" — les deux
    # conteneurs (ui et api) doivent être sur le même réseau Docker.
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Fichiers statiques (index.html, chat.html) ─────────
        root  /usr/share/nginx/html;
        index index.html;

        # ── Contrôle d'accès — toutes les pages ────────────────
        # Chaque page exige un utilisateur membre du groupe ACCESS_GROUP
        # (LDAP/AD, "docsearch-users" par défaut — voir
        # docsearch-api/app/access_auth.py). La vérification se fait
        # côté API (seule à pouvoir interroger LDAP) via ce subrequest
        # interne ; Nginx se contente de propager son code 200/401/403.
        location = /_access_check {
            internal;
            proxy_pass          http://api_backend/auth/check-access;
            proxy_pass_request_body off;
            proxy_set_header    Content-Length "";
            proxy_set_header    X-User $http_x_user;
        }

        # /admin exige en plus le groupe ADMIN_GROUP (docsearch-admins),
        # pas seulement ACCESS_GROUP — un membre de docsearch-users qui
        # n'est pas admin doit recevoir un vrai 401/403 ici, pas un 200
        # avec la page qui affiche ensuite "Accès refusé" en JS (voir
        # refresh() dans admin.html, qui échoue sur les appels /admin/*).
        location = /_admin_check {
            internal;
            proxy_pass          http://api_backend/auth/check-admin;
            proxy_pass_request_body off;
            proxy_set_header    Content-Length "";
            proxy_set_header    X-User $http_x_user;
        }

        location / {
            auth_request /_access_check;
            try_files $uri $uri/ =404;
        }

        # Fichiers statiques sans extension .html dans l'URL (liens du
        # type /chat, /admin plutôt que /chat.html, /admin.html) —
        # try_files seul ne les trouve pas et renvoyait un vrai 404.
        location = /chat {
            auth_request /_access_check;
            try_files /chat.html =404;
        }
        location = /admin {
            auth_request /_admin_check;
            try_files /admin.html =404;
        }
        # Le fichier physique est aussi accessible directement en
        # /admin.html (contournant "location = /admin" ci-dessus) —
        # sans ce bloc dédié, il retombait dans "location /" et
        # n'était protégé que par _access_check (docsearch-users),
        # pas _admin_check (docsearch-admins).
        location = /admin.html {
            auth_request /_admin_check;
            try_files /admin.html =404;
        }
        location = /help {
            auth_request /_access_check;
            try_files /help.html =404;
        }
        location = /admin-help {
            auth_request /_access_check;
            try_files /admin-help.html =404;
        }

        # ── Proxy vers l'API — permet d'utiliser l'UI directement
        # (port 8080 en dev) sans dépendre du reverse proxy de
        # production (docsearch-infra/nginx/nginx.conf), qui reste
        # nécessaire pour le SSL et l'injection du header SSO.
        location /search {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
            # Nécessaire pour la page de stats admin (/admin/search-logs) —
            # sans ça, l'API ne verrait que l'IP interne du conteneur ui,
            # pas celle du client (voir get_client_ip() dans docsearch-api).
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/(document|health)(/|$) {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        location /saved-searches {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Notifications in-app des recherches sauvegardées en alerte
        # (🔔 Alertes, voir index.html) — /alerts, /alerts/{id}/seen,
        # /alerts/mark-all-seen.
        location /alerts {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Collections de documents personnelles ("📋 Mes collections", voir index.html)
        location /collections {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # ── Mesure de satisfaction (pouce, tracking de clic, NPS,
        # suggestions) — /admin/engagement-config, /admin/nps-summary et
        # /admin/suggestions sont déjà couverts par "location /admin/".
        location ~ ^/(engagement-config|feedback|click|nps|suggestions)$ {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Présélection de sources avant recherche (voir index.html)
        location = /searchable-sources {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Facettes SQL personnalisées actives (ex: bureau/fonction),
        # pour la syntaxe avancée de la barre de recherche (voir index.html)
        location = /custom-facets {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Bascules d'interface (ex: visibilité du lien Assistant IA) —
        # /admin/ui-config est déjà couvert par "location /admin/".
        location = /ui-config {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Visibilité des liens Administration/Statistiques (voir index.html)
        location = /is-admin {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        # Composition des gabarits d'affichage des résultats (public — voir
        # index.html:renderCard()) — /admin/display-styles est déjà couvert
        # par "location /admin/".
        location = /display-styles {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
        }

        location /ask {
            proxy_pass          http://api_backend;
            proxy_read_timeout  120s;
        }

        location /metrics {
            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_buffering     off;
        }

        location /api/preview/ {
            proxy_pass         http://api_backend;
            proxy_read_timeout 120s;
            proxy_buffering    off;
        }

        # ── Panneau d'administration — proxifié vers l'API, qui
        # applique elle-même le contrôle d'accès (groupe LDAP admin,
        # voir admin_auth.py). Nginx ne fait ici que transmettre le
        # header X-User déjà injecté en amont (SSO, en production).
        location /admin/ {
            proxy_pass         http://api_backend;
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
        }
    }
}
